<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tickets – IT Helpdesk</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sidebar" id="sidebar"></div>

  <div class="main-content">
    <h1 id="pageTitle">Tickets</h1>

    <input type="text" id="search" placeholder="Search title or description..." style="width:100%; max-width:480px; padding:12px; margin:16px 0; border:1px solid #d1d5db; border-radius:6px;">

    <div id="ticketsContainer"></div>
  </div>

  <script src="app.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = '/index.html';
    }

    const currentUser = getCurrentUser();
    const isAdmin = currentUser.role === 'admin';

    // Dynamic sidebar
    document.getElementById('sidebar').innerHTML = `
      <h2>IT Helpdesk</h2>
      <nav>
        <ul>
          <li><a href="${isAdmin ? '/admin.html' : '/user.html'}">Dashboard</a></li>
          <li><a href="/tickets.html" class="active">Tickets</a></li>
          ${isAdmin ? '<li><a href="#" onclick="showManageUsers(); return false;">Manage Users</a></li>' : ''}
          <li><a href="#" onclick="logout(); return false;">Logout</a></li>
        </ul>
      </nav>
    `;

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('pageTitle').textContent = isAdmin ? 'All Tickets' : 'My Tickets';
      renderTickets();

      document.getElementById('search').addEventListener('input', renderTickets);
    });

    function renderTickets() {
      const query = document.getElementById('search').value.toLowerCase().trim();
      let tickets = getTickets();

      if (!isAdmin) {
        tickets = tickets.filter(t => t.createdBy === currentUser.id);
      }

      if (query) {
        tickets = tickets.filter(t =>
          t.title.toLowerCase().includes(query) ||
          t.desc.toLowerCase().includes(query)
        );
      }

      document.getElementById('ticketsContainer').innerHTML = tickets.length === 0
        ? '<p style="padding:24px; color:#64748b;">No tickets found.</p>'
        : tickets.map(t => `
          <div class="ticket-item">
            <div style="flex:1;">
              <h3>${t.title}</h3>
              <p style="margin:8px 0; color:#475569;">${t.desc}</p>
              <div class="meta">
                Status: <strong>${t.status}</strong>  • 
                Priority: <strong>${t.priority}</strong>  • 
                ${new Date(t.createdAt).toLocaleString()}
              </div>
            </div>

            ${isAdmin ? `
            <div class="actions">
              <select onchange="updateStatus(${t.id}, this.value)">
                <option ${t.status==='Open'?'selected':''}>Open</option>
                <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
                <option ${t.status==='Closed'?'selected':''}>Closed</option>
              </select>

              <select onchange="updatePriority(${t.id}, this.value)">
                <option ${t.priority==='Low'?'selected':''}>Low</option>
                <option ${t.priority==='Medium'?'selected':''}>Medium</option>
                <option ${t.priority==='High'?'selected':''}>High</option>
              </select>

              <button class="danger" onclick="deleteTicket(${t.id})">Delete</button>
            </div>
            ` : ''}
          </div>
        `).join('');
    }

    function updateStatus(id, status) {
      let tickets = getTickets();
      const ticket = tickets.find(t => t.id === id);
      if (ticket) {
        ticket.status = status;
        saveTickets(tickets);
        renderTickets();
      }
    }

    function updatePriority(id, priority) {
      let tickets = getTickets();
      const ticket = tickets.find(t => t.id === id);
      if (ticket) {
        ticket.priority = priority;
        saveTickets(tickets);
        renderTickets();
      }
    }

    function deleteTicket(id) {
      if (!confirm('Delete this ticket permanently?')) return;
      saveTickets(getTickets().filter(t => t.id !== id));
      renderTickets();
    }
  </script>
</body>
</html>
