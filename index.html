<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WorldTech ServiceDesk</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
:root{
--bg:#f6f8fb;
--sidebar:#ffffff;
--card:#ffffff;
--border:#e5e7eb;
--accent:#2563eb;
--text:#111827;
--muted:#6b7280;
}

*{box-sizing:border-box;font-family:Inter}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

.login-container{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
width:320px;
}

.login-box h2{
margin-top:0;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:12px;
border-radius:6px;
border:1px solid var(--border);
font-size:14px;
}

button{
background:var(--accent);
color:white;
border:none;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:white;
border-bottom:1px solid var(--border);
}

.logo{
font-weight:600;
font-size:18px;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:240px;
background:var(--sidebar);
border-right:1px solid var(--border);
padding-top:10px;
}

.sidebar a{
display:block;
padding:12px 20px;
text-decoration:none;
color:var(--text);
font-size:14px;
}

.sidebar a.active,
.sidebar a:hover{
background:#eef2ff;
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:white;
border-radius:10px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.05);
}

.table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

.table th,.table td{
border-bottom:1px solid var(--border);
padding:10px;
text-align:left;
}

.badge{
padding:4px 8px;
border-radius:4px;
font-size:12px;
}

.open{background:#dbeafe}
.progress{background:#fde68a}
.closed{background:#bbf7d0}

.chatbox{
height:300px;
overflow:auto;
border:1px solid var(--border);
border-radius:6px;
padding:10px;
margin-bottom:10px;
background:white;
}

.note{
background:white;
border:1px solid var(--border);
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="loginPage" class="login-container">
<div class="login-box">
<h2>WorldTech ServiceDesk</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button onclick="login()">Sign in</button>

<div id="loginError" style="color:red;font-size:13px;margin-top:8px"></div>

</div>
</div>

<div id="app" style="display:none">

<header>
<div class="logo">WorldTech ServiceDesk</div>
<div>
<span id="clock"></span>
<i class="fa fa-bell" onclick="fakeAlert()" style="margin-left:15px;cursor:pointer"></i>
</div>
</header>

<div class="container">

<div class="sidebar">

<a onclick="showPage('dashboard')" class="active">Dashboard</a>
<a onclick="showPage('tickets')">Tickets</a>
<a onclick="showPage('create')">Create Ticket</a>
<a onclick="showPage('kb')">Knowledge Base</a>
<a onclick="showPage('calendar')">Calendar</a>
<a onclick="showPage('notes')">Notes</a>
<a onclick="showPage('users')" id="usersLink">User Management</a>
<a onclick="exportCSV()">Export CSV</a>

</div>

<div class="main">

<div id="dashboardPage">

<div class="cards">
<div class="card"><h2 id="totalCount">0</h2>Total</div>
<div class="card"><h2 id="openCount">0</h2>Open</div>
<div class="card"><h2 id="progressCount">0</h2>In Progress</div>
<div class="card"><h2 id="closedCount">0</h2>Closed</div>
</div>

</div>

<div id="ticketsPage" style="display:none">

<input id="searchTicket" placeholder="Search ticket..." onkeyup="renderTickets()">

<table class="table">
<thead>
<tr>
<th>Title</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="ticketTable"></tbody>
</table>

</div>

<div id="createPage" style="display:none">

<input id="title" placeholder="Ticket title">

<textarea id="desc" placeholder="Description"></textarea>

<button onclick="voiceInput()"><i class="fa fa-microphone"></i> Voice</button>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<select id="category">
<option>Network</option>
<option>Software</option>
<option>Hardware</option>
</select>

<button onclick="aiSuggest()">AI Suggest Priority</button>
<button onclick="createTicket()">Create Ticket</button>

</div>

<div id="kbPage" style="display:none">

<div class="chatbox" id="chat"></div>

<input id="aiInput" placeholder="Ask IT issue">

<button onclick="askAI()">Ask AI</button>

</div>

<div id="calendarPage" style="display:none">
<div id="calendar"></div>
</div>

<div id="notesPage" style="display:none">

<textarea id="noteText"></textarea>
<button onclick="saveNote()">Save</button>

<div id="noteList"></div>

</div>

<div id="usersPage" style="display:none">

<h3>User Management</h3>

<input id="newUser" placeholder="Username">
<input id="newPass" placeholder="Password">
<select id="newRole">
<option>user</option>
<option>admin</option>
</select>

<button onclick="addUser()">Add User</button>

<table class="table">
<thead>
<tr>
<th>User</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

</div>

</div>
</div>

</div>

<script>

/* GROQ API KEY PLACEHOLDER */
const GROQ_API_KEY="PASTE_GROQ_API_KEY_HERE";

/* HARD-CODED ADMIN ACCOUNT */

const ADMIN_EMAIL="armtechbridge@gmail.com";
const ADMIN_PASSWORD="1043520";

/* SESSION */
let currentUser=null;

/* INIT STORAGE */

if(!localStorage.users){
localStorage.users=JSON.stringify([
{email:ADMIN_EMAIL,password:ADMIN_PASSWORD,role:"admin"}
]);
}

/* LOGIN */

function login(){

let email=loginEmail.value;
let pass=loginPassword.value;

let users=JSON.parse(localStorage.users);

let u=users.find(x=>x.email==email && x.password==pass);

if(!u){
loginError.innerText="Invalid login";
return;
}

currentUser=u;

loginPage.style.display="none";
app.style.display="block";

if(u.role!="admin") usersLink.style.display="none";

init();

}

/* INIT */

function init(){
renderTickets();
renderUsers();
updateStats();
loadNotes();
initCalendar();
}

/* CLOCK */

setInterval(()=>{

let d=new Date();
let h=d.getHours()%12||12;
let m=d.getMinutes().toString().padStart(2,"0");
let ampm=d.getHours()>=12?"PM":"AM";

clock.innerText=h+":"+m+" "+ampm;

},1000)

/* NAV */

function showPage(p){

document.querySelectorAll(".sidebar a").forEach(x=>x.classList.remove("active"));
event.target.classList.add("active");

["dashboard","tickets","create","kb","calendar","notes","users"].forEach(x=>{
document.getElementById(x+"Page").style.display="none";
});

document.getElementById(p+"Page").style.display="block";

}

/* TICKETS */

function createTicket(){

let tickets=JSON.parse(localStorage.tickets||"[]");

tickets.push({
title:title.value,
desc:desc.value,
priority:priority.value,
status:"Open",
owner:currentUser.email
});

localStorage.tickets=JSON.stringify(tickets);

renderTickets();
updateStats();

}

function renderTickets(){

let tickets=JSON.parse(localStorage.tickets||"[]");
let q=searchTicket.value?.toLowerCase()||"";

ticketTable.innerHTML="";

tickets
.filter(t=>t.title.toLowerCase().includes(q))
.forEach((t,i)=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${t.title}</td>
<td>${t.priority}</td>
<td><span class="badge ${t.status.toLowerCase()}">${t.status}</span></td>
<td>
<button onclick="changeStatus(${i})">Status</button>
<button onclick="deleteTicket(${i})">Delete</button>
<button onclick="fixAI(${i})">AI Fix</button>
</td>
`;

ticketTable.appendChild(tr);

});

}

/* STATUS */

function changeStatus(i){

let tickets=JSON.parse(localStorage.tickets);

let s=prompt("Open / In Progress / Closed");

tickets[i].status=s;

localStorage.tickets=JSON.stringify(tickets);

renderTickets();
updateStats();

}

/* DELETE */

function deleteTicket(i){

if(confirm("Delete ticket?")){

let t=JSON.parse(localStorage.tickets);
t.splice(i,1);
localStorage.tickets=JSON.stringify(t);
renderTickets();

}

}

/* STATS */

function updateStats(){

let t=JSON.parse(localStorage.tickets||"[]");

totalCount.innerText=t.length;
openCount.innerText=t.filter(x=>x.status=="Open").length;
progressCount.innerText=t.filter(x=>x.status=="In Progress").length;
closedCount.innerText=t.filter(x=>x.status=="Closed").length;

}

/* USER MANAGEMENT */

function renderUsers(){

let users=JSON.parse(localStorage.users);

userTable.innerHTML="";

users.forEach((u,i)=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${u.email}</td>
<td>${u.role}</td>
<td>
<button onclick="editUser(${i})">Edit</button>
<button onclick="deleteUser(${i})">Delete</button>
</td>
`;

userTable.appendChild(tr);

});

}

function addUser(){

let users=JSON.parse(localStorage.users);

users.push({
email:newUser.value,
password:newPass.value,
role:newRole.value
});

localStorage.users=JSON.stringify(users);

renderUsers();

}

function editUser(i){

let users=JSON.parse(localStorage.users);

let p=prompt("New password");
let r=prompt("Role admin/user");

users[i].password=p;
users[i].role=r;

localStorage.users=JSON.stringify(users);

renderUsers();

}

function deleteUser(i){

let users=JSON.parse(localStorage.users);

users.splice(i,1);

localStorage.users=JSON.stringify(users);

renderUsers();

}

/* AI CHAT */

async function askAI(){

let q=aiInput.value;

chat.innerHTML+="<div><b>You:</b> "+q+"</div>";

let res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_API_KEY
},
body:JSON.stringify({
model:"llama3-8b-8192",
messages:[{role:"user",content:q}]
})
});

let data=await res.json();

chat.innerHTML+="<div><b>AI:</b>"+data.choices[0].message.content+"</div>";

}

/* AI PRIORITY */

function aiSuggest(){
alert("AI suggestion will analyze description using Groq.");
}

/* AI FIX */

function fixAI(i){

let tickets=JSON.parse(localStorage.tickets);

aiInput.value="How to fix: "+tickets[i].title;

showPage("kb");

}

/* VOICE */

function voiceInput(){

let r=new webkitSpeechRecognition();

r.onresult=e=>{
desc.value+=e.results[0][0].transcript;
};

r.start();

}

/* CALENDAR */

function initCalendar(){

let el=document.getElementById("calendar");

let calendar=new FullCalendar.Calendar(el,{
initialView:"dayGridMonth",
events:JSON.parse(localStorage.events||"[]"),
dateClick(info){

let title=prompt("Event title");

if(title){

calendar.addEvent({title,start:info.dateStr});

let events=calendar.getEvents().map(e=>({
title:e.title,
start:e.start
}));

localStorage.events=JSON.stringify(events);

}

}
});

calendar.render();

}

/* NOTES */

function saveNote(){

let notes=JSON.parse(localStorage.notes||"[]");

notes.push(noteText.value);

localStorage.notes=JSON.stringify(notes);

loadNotes();

}

function loadNotes(){

let notes=JSON.parse(localStorage.notes||"[]");

noteList.innerHTML="";

notes.forEach(n=>{
let d=document.createElement("div");
d.className="note";
d.innerText=n;
noteList.appendChild(d);
});

}

/* CSV EXPORT */

function exportCSV(){

let t=JSON.parse(localStorage.tickets||"[]");

let csv="Title,Priority,Status\n";

t.forEach(x=>csv+=`${x.title},${x.priority},${x.status}\n`);

let blob=new Blob([csv]);

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="tickets.csv";
a.click();

}

/* FAKE ALERT */

function fakeAlert(){
alert("New ticket assigned!");
}

</script>

</body>
</html>
