<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Helpdesk • AI Assisted</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      color: #e2e8f0;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 15% 85%, rgba(99,102,241,0.22) 0%, transparent 50%),
                  radial-gradient(circle at 85% 15%, rgba(139,92,246,0.22) 0%, transparent 50%),
                  radial-gradient(circle at 50% 50%, rgba(34,197,94,0.12) 0%, transparent 60%);
      z-index: -2;
    }

    .hidden { display: none !important; }

    /* ─── LOGIN ─── */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(30, 30, 50, 0.92);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(99,102,241,0.35);
      padding: 48px 36px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .login-card h1 { color: white; margin-bottom: 20px; font-weight: 500; }
    .login-card input, .login-card button {
      width: 100%;
      padding: 14px 16px;
      margin: 12px 0;
      border-radius: 10px;
      font-size: 1rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.16);
      color: white;
    }

    .login-card button {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      font-weight: 500;
      cursor: pointer;
    }

    .error { color: #ff6b6b; margin-top: 12px; font-size: 0.95rem; }

    /* ─── LAYOUT ─── */
    #appLayout { display: flex; min-height: 100vh; }

    #sidebar {
      width: 260px;
      background: rgba(15,15,35,0.97);
      backdrop-filter: blur(12px);
      border-right: 1px solid rgba(99,102,241,0.18);
      color: #e2e8f0;
      padding: 32px 20px;
      position: fixed;
      height: 100%;
      overflow-y: auto;
    }

    #sidebar h2 {
      color: white;
      margin-bottom: 36px;
      text-align: center;
      font-weight: 500;
    }

    #sidebar a {
      display: block;
      padding: 14px 18px;
      margin: 6px 0;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.2s;
    }

    #sidebar a:hover,
    #sidebar a.active {
      background: rgba(99,102,241,0.28);
      color: white;
    }

    #mainContent {
      margin-left: 260px;
      padding: 40px;
      width: 100%;
    }

    h1 { color: white; margin-bottom: 24px; font-weight: 500; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 32px 0;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 28px;
      border-radius: 14px;
      text-align: center;
    }

    .card h3 { color: #94a3b8; margin-bottom: 10px; font-weight: 400; }
    .card span { font-size: 2.8rem; font-weight: 700; color: #6366f1; }

    .section-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 32px;
      border-radius: 14px;
      margin: 32px 0;
    }

    form { display: flex; flex-direction: column; gap: 18px; }

    input, textarea, select, button {
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 1rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.16);
      color: white;
    }

    button {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    button.ai-btn {
      background: linear-gradient(90deg, #10b981, #059669);
      font-size: 0.95rem;
      padding: 10px 20px;
      align-self: flex-start;
      border-radius: 10px;
    }

    button.danger {
      background: linear-gradient(90deg, #ef4444, #dc2626);
    }

    .ticket-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 24px;
      margin: 20px 0;
      border-radius: 14px;
      display: flex;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .ticket-item h3 { color: white; margin-bottom: 12px; }
    .ticket-item p { color: #cbd5e1; line-height: 1.6; }

    .meta { margin-top: 14px; font-size: 0.92rem; color: #94a3b8; }

    .actions { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }

    @media (max-width: 900px) {
      #sidebar { width: 100%; height: auto; position: static; padding: 24px 16px; }
      #mainContent { margin-left: 0; padding: 24px; }
      .ticket-item { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginPage">
    <div class="login-card">
      <h1>IT Helpdesk AI</h1>
      <p style="color:#94a3b8; margin:20px 0 32px; line-height:1.6;">
        Username + Password login<br><br>
        <strong>admin / admin</strong>  → Admin<br>
        <strong>user1 / pass</strong>  → Regular user
      </p>

      <form id="loginForm">
        <input type="text"     id="username" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required autocomplete="off">
        <button type="submit">Sign In</button>
      </form>

      <p id="loginError" class="error"></p>
    </div>
  </div>

  <!-- MAIN APPLICATION -->
  <div id="appLayout" class="hidden">

    <div id="sidebar"></div>

    <div id="mainContent">

      <!-- ─── DASHBOARD ─── -->
      <div id="dashboardPage">
        <h1 id="dashboardTitle">Dashboard</h1>

        <div class="stats-grid">
          <div class="card"><h3>Total Tickets</h3><span id="statTotal">—</span></div>
          <div class="card"><h3>Open</h3><span id="statOpen">—</span></div>
          <div class="card"><h3>In Progress</h3><span id="statInProgress">—</span></div>
          <div class="card"><h3>Closed</h3><span id="statClosed">—</span></div>
        </div>

        <!-- User — Create Ticket -->
        <div id="createTicketArea" class="section-card hidden">
          <h2>Create New Ticket</h2>
          <form id="createTicketForm">
            <input type="text" id="ticketTitle" placeholder="Ticket Title" required>
            <textarea id="ticketDesc" placeholder="Describe your issue in detail..." rows="6" required></textarea>

            <button type="button" class="ai-btn" onclick="suggestPriority()">AI Suggest Priority</button>

            <div style="display:flex; gap:16px; flex-wrap:wrap;">
              <select id="ticketPriority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
              <button type="submit">Create Ticket</button>
            </div>
          </form>
        </div>

        <!-- Admin — Manage Users -->
        <div id="manageUsersArea" class="section-card hidden">
          <h2>Manage Users</h2>
          <form id="addUserForm" style="display:flex; gap:14px; flex-wrap:wrap; margin:24px 0;">
            <input type="text" id="newUsername" placeholder="Username" required style="flex:1; min-width:180px;">
            <input type="password" id="newPassword" placeholder="Password" required style="flex:1; min-width:180px;">
            <button type="submit">Add User</button>
          </form>
          <div id="usersList"></div>
        </div>

        <!-- Troubleshooting / Knowledge Base -->
        <div class="section-card">
          <h2>Common Issues & Troubleshooting</h2>
          <input type="text" id="kbSearch" placeholder="Search solutions..." style="width:100%; max-width:420px; margin:16px 0 24px;">
          <div id="knowledgeList"></div>
        </div>
      </div>

      <!-- ─── TICKETS VIEW ─── -->
      <div id="ticketsPage" class="section-card hidden">
        <h1 id="ticketsTitle">Tickets</h1>
        <input type="text" id="searchInput" placeholder="Search tickets..." style="width:100%; max-width:500px; margin-bottom:24px;">
        <div id="ticketsList"></div>
      </div>
    </div>
  </div>

  <script>
    // ─── DEFAULT DATA ───────────────────────────────────────

    const defaultUsers = [
      { id:1, username:'admin',  password:'admin',  role:'admin' },
      { id:2, username:'user1',  password:'pass',   role:'user'  }
    ];

    const defaultKB = [
      { title:"Computer very slow", text:"1. Close unnecessary programs\n2. Run Disk Cleanup\n3. Update graphics driver\n4. Scan with antivirus\n5. Consider more RAM" },
      { title:"No internet / Wi-Fi", text:"1. Restart router & PC\n2. Forget network → reconnect\n3. ipconfig /release → ipconfig /renew\n4. Check cables / signal" },
      { title:"Printer not printing", text:"1. Check power & connection\n2. Set as default printer\n3. Clear print queue\n4. Reinstall driver\n5. Run Windows Printer Troubleshooter" },
      { title:"Blue screen / crash", text:"1. Note the error code\n2. Boot to Safe Mode\n3. Update Windows & drivers\n4. Check RAM / hardware\n5. Run sfc /scannow" },
      { title:"Email not sending", text:"1. Check credentials & server settings\n2. Clear cache / cookies\n3. Check sent items & spam\n4. Test with webmail" }
    ];

    // ─── STORAGE HELPERS ────────────────────────────────────

    function initStorage() {
      if (!localStorage.users)    localStorage.users    = JSON.stringify(defaultUsers);
      if (!localStorage.tickets)  localStorage.tickets  = JSON.stringify([]);
      if (!localStorage.kb)       localStorage.kb       = JSON.stringify(defaultKB);
    }

    const getUsers      = () => JSON.parse(localStorage.users    || '[]');
    const saveUsers     = u  => localStorage.users    = JSON.stringify(u);
    const getTickets    = () => JSON.parse(localStorage.tickets  || '[]');
    const saveTickets   = t  => localStorage.tickets  = JSON.stringify(t);
    const getKB         = () => JSON.parse(localStorage.kb       || '[]');
    const saveKB        = k  => localStorage.kb       = JSON.stringify(k);

    let currentUser = null;

    // ─── AUTH ───────────────────────────────────────────────

    function tryLogin(username, password) {
      const user = getUsers().find(u => u.username === username && u.password === password);
      if (user) {
        currentUser = user;
        localStorage.currentUser = JSON.stringify(user);
        return true;
      }
      return false;
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('currentUser');
      showView('login');
    }

    function isAdmin() {
      return currentUser?.role === 'admin';
    }

    // ─── NAVIGATION ─────────────────────────────────────────

    function showView(view) {
      // Hide everything
      document.querySelectorAll('#loginPage, #dashboardPage, #ticketsPage, #createTicketArea, #manageUsersArea').forEach(el => el.classList.add('hidden'));

      if (view === 'login') {
        document.getElementById('loginPage').classList.remove('hidden');
        return;
      }

      document.getElementById('appLayout').classList.remove('hidden');

      // Sidebar
      document.getElementById('sidebar').innerHTML = `
        <h2>IT Helpdesk AI</h2>
        <a href="#" ${view==='dashboard'?'class="active"':''} onclick="showView('dashboard');return false">Dashboard</a>
        <a href="#" ${view==='tickets'?'class="active"':''}   onclick="showView('tickets');return false">${isAdmin()?'All Tickets':'My Tickets'}</a>
        ${isAdmin() ? '<a href="#" onclick="showManageUsers();return false">Manage Users</a>' : ''}
        <a href="#" onclick="logout();return false">Logout</a>
      `;

      if (view === 'tickets') {
        document.getElementById('ticketsPage').classList.remove('hidden');
        renderTickets();
      } else {
        document.getElementById('dashboardPage').classList.remove('hidden');
        updateDashboard();
        if (!isAdmin()) {
          document.getElementById('createTicketArea').classList.remove('hidden');
        }
      }
    }

    function showManageUsers() {
      document.getElementById('createTicketArea').classList.add('hidden');
      document.getElementById('manageUsersArea').classList.remove('hidden');
      renderUserList();
    }

    // ─── RENDER ─────────────────────────────────────────────

    function updateDashboard() {
      const tickets = getTickets().filter(t => isAdmin() || t.createdBy === currentUser.id);
      document.getElementById('statTotal').textContent      = tickets.length;
      document.getElementById('statOpen').textContent       = tickets.filter(t=>t.status==='Open').length;
      document.getElementById('statInProgress').textContent = tickets.filter(t=>t.status==='In Progress').length;
      document.getElementById('statClosed').textContent     = tickets.filter(t=>t.status==='Closed').length;

      document.getElementById('dashboardTitle').textContent = isAdmin() ? 'Admin Dashboard' : 'My Dashboard';
    }

    function renderTickets() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      let list = getTickets();

      if (!isAdmin()) list = list.filter(t => t.createdBy === currentUser.id);

      if (q) {
        list = list.filter(t =>
          t.title.toLowerCase().includes(q) ||
          t.description.toLowerCase().includes(q)
        );
      }

      document.getElementById('ticketsTitle').textContent = isAdmin() ? 'All Tickets' : 'My Tickets';

      document.getElementById('ticketsList').innerHTML = list.length === 0
        ? '<p style="color:#94a3b8; padding:32px; text-align:center;">No tickets found.</p>'
        : list.map(t => `
          <div class="ticket-item">
            <div style="flex:1;">
              <h3>${t.title}</h3>
              <p>${t.description}</p>
              <div class="meta">
                <strong>${t.status}</strong> • ${t.priority} • ${new Date(t.createdAt).toLocaleString()}
              </div>
            </div>
            ${isAdmin() ? `
            <div class="actions">
              <select onchange="updateTicket(${t.id}, 'status', this.value)">
                <option ${t.status==='Open'?'selected':''}>Open</option>
                <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
                <option ${t.status==='Closed'?'selected':''}>Closed</option>
              </select>
              <select onchange="updateTicket(${t.id}, 'priority', this.value)">
                <option ${t.priority==='Low'?'selected':''}>Low</option>
                <option ${t.priority==='Medium'?'selected':''}>Medium</option>
                <option ${t.priority==='High'?'selected':''}>High</option>
              </select>
              <button class="ai-btn" onclick="suggestFix(${t.id})">AI Quick Fix</button>
              <button class="danger" onclick="deleteTicket(${t.id})">Delete</button>
            </div>` : ''}
          </div>
        `).join('');
    }

    function renderUserList() {
      const users = getUsers().filter(u => u.role === 'user');
      document.getElementById('usersList').innerHTML = users.length === 0
        ? '<p style="color:#94a3b8;">No regular users yet.</p>'
        : users.map(u => `
          <div style="background:rgba(255,255,255,0.06); padding:14px; margin:12px 0; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>${u.username}</span>
            <button class="danger" onclick="deleteUser(${u.id})">Delete</button>
          </div>
        `).join('');
    }

    function renderKnowledgeBase() {
      const q = document.getElementById('kbSearch').value.toLowerCase().trim();
      const items = getKB().filter(i =>
        i.title.toLowerCase().includes(q) || i.text.toLowerCase().includes(q)
      );

      document.getElementById('knowledgeList').innerHTML = items.length === 0
        ? '<p style="color:#94a3b8; text-align:center; padding:32px;">No matching guides found.</p>'
        : items.map(i => `
          <div class="section-card" style="margin:16px 0;">
            <h3 style="margin-bottom:12px;">${i.title}</h3>
            <p style="white-space:pre-line; color:#cbd5e1;">${i.text}</p>
          </div>
        `).join('');
    }

    // ─── ACTIONS ────────────────────────────────────────────

    function suggestPriority() {
      const text = document.getElementById('ticketDesc').value.toLowerCase();
      if (!text) return alert("Write something first.");

      let prio = "Medium";
      let msg = "AI Suggestion:\n\n";

      if (/urgent|critical|emergency|down|crash|stopped/i.test(text)) {
        prio = "High";
        msg += "→ Looks urgent/critical → **High** priority suggested\n";
      } else if (/slow|lag|freeze|stuck|delay/i.test(text)) {
        prio = "Medium";
        msg += "→ Performance issue → **Medium** priority\n";
      } else {
        msg += "→ No strong urgency detected → **Medium** priority\n";
      }

      document.getElementById('ticketPriority').value = prio;
      alert(msg);
    }

    function suggestFix(ticketId) {
      const ticket = getTickets().find(t => t.id === ticketId);
      if (!ticket) return alert("Ticket not found.");

      const d = ticket.description.toLowerCase();
      let msg = "AI Quick Fix Ideas:\n\n";

      if (/printer/i.test(d)) {
        msg += "Printer problem?\n1. Check power & connection\n2. Clear print queue\n3. Reinstall driver\n4. Run printer troubleshooter";
      } else if (/slow|lag|freeze/i.test(d)) {
        msg += "Slow performance?\n1. Close background apps\n2. Update graphics driver\n3. Run disk cleanup\n4. Scan for malware";
      } else if (/wifi|internet|network/i.test(d)) {
        msg += "Network issue?\n1. Restart router & device\n2. Forget & reconnect Wi-Fi\n3. ipconfig /renew\n4. Check cables";
      } else {
        msg += "No specific pattern detected.\nTry: restart → update drivers → scan → check cables.";
      }

      alert(msg);
    }

    function updateTicket(id, field, value) {
      let tickets = getTickets();
      const idx = tickets.findIndex(t => t.id === id);
      if (idx !== -1) {
        tickets[idx][field] = value;
        saveTickets(tickets);
        renderTickets();
        updateDashboard();
      }
    }

    function deleteTicket(id) {
      if (!confirm("Delete ticket permanently?")) return;
      saveTickets(getTickets().filter(t => t.id !== id));
      renderTickets();
      updateDashboard();
    }

    function deleteUser(id) {
      if (!confirm("Delete this user?")) return;
      saveUsers(getUsers().filter(u => u.id !== id));
      renderUserList();
    }

    // ─── INIT & EVENT LISTENERS ─────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      initStorage();

      // Resume session
      try {
        const stored = localStorage.currentUser;
        if (stored) {
          currentUser = JSON.parse(stored);
          if (getUsers().some(u => u.id === currentUser.id)) {
            showView('dashboard');
          } else {
            localStorage.removeItem('currentUser');
          }
        }
      } catch {}

      if (!currentUser) showView('login');

      // ─── LOGIN ───
      document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const un = document.getElementById('username').value.trim();
        const pw = document.getElementById('password').value;
        if (tryLogin(un, pw)) {
          showView('dashboard');
        } else {
          document.getElementById('loginError').textContent = 'Invalid username or password';
        }
      });

      // ─── CREATE TICKET ───
      document.getElementById('createTicketForm').addEventListener('submit', e => {
        e.preventDefault();
        const title = document.getElementById('ticketTitle').value.trim();
        const desc  = document.getElementById('ticketDesc').value.trim();
        const prio  = document.getElementById('ticketPriority').value;

        if (!title || !desc) return alert("Title and description required.");

        const tickets = getTickets();
        tickets.push({
          id: Date.now(),
          title,
          description: desc,
          status: 'Open',
          priority: prio,
          createdBy: currentUser.id,
          createdAt: new Date().toISOString()
        });
        saveTickets(tickets);
        e.target.reset();
        alert("Ticket created successfully.");
        updateDashboard();
      });

      // ─── ADD USER (ADMIN) ───
      document.getElementById('addUserForm').addEventListener('submit', e => {
        e.preventDefault();
        const un = document.getElementById('newUsername').value.trim();
        const pw = document.getElementById('newPassword').value;

        if (!un || !pw) return alert("Both fields required.");

        const users = getUsers();
        if (users.some(u => u.username === un)) return alert("Username already exists.");

        const id = Math.max(0, ...users.map(u=>u.id)) + 1;
        users.push({ id, username: un, password: pw, role: 'user' });
        saveUsers(users);
        alert("User added.");
        renderUserList();
        e.target.reset();
      });

      // ─── SEARCH ───
      document.getElementById('searchInput')?.addEventListener('input', renderTickets);
      document.getElementById('kbSearch')?.addEventListener('input', renderKnowledgeBase);
    });
  </script>
</body>
</html>
