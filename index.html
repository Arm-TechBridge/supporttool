<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Helpdesk - AI Assisted</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      color: #e2e8f0;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.25) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(255,119,198,0.25) 0%, transparent 50%),
                  radial-gradient(circle at 40% 40%, rgba(120,219,255,0.25) 0%, transparent 50%);
      z-index: -2;
    }

    .hidden { display: none !important; }

    /* Login */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(30, 30, 50, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 100, 255, 0.3);
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .login-card h1 { color: #fff; margin-bottom: 16px; }
    .login-card input, .login-card button {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 8px;
      font-size: 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
    }

    .login-card button {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    .error { color: #ff6b6b; margin-top: 12px; font-size: 0.95rem; }

    /* Layout */
    #appLayout { display: flex; min-height: 100vh; }

    #sidebar {
      width: 240px;
      background: rgba(15, 15, 35, 0.96);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(100,100,255,0.15);
      color: #e2e8f0;
      padding: 24px 16px;
      position: fixed;
      height: 100%;
      overflow-y: auto;
    }

    #sidebar h2 {
      color: white;
      margin-bottom: 32px;
      text-align: center;
      font-weight: 500;
    }

    #sidebar a {
      display: block;
      padding: 12px 16px;
      margin: 4px 0;
      color: #d1d5db;
      text-decoration: none;
      border-radius: 8px;
      transition: all 0.2s;
    }

    #sidebar a:hover,
    #sidebar a.active {
      background: rgba(99, 102, 241, 0.25);
      color: white;
    }

    #mainContent {
      margin-left: 240px;
      padding: 32px;
      width: 100%;
      background: rgba(26,26,46,0.4);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      margin: 32px 0;
    }

    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 24px;
      border-radius: 12px;
      text-align: center;
    }

    .card h3 { color: #94a3b8; margin-bottom: 8px; font-weight: 400; }
    .card span { font-size: 2.6rem; font-weight: 700; color: #6366f1; }

    .section-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 28px;
      border-radius: 12px;
      margin: 32px 0;
    }

    form { display: flex; flex-direction: column; gap: 16px; }

    input, textarea, select, button {
      padding: 14px;
      border-radius: 8px;
      font-size: 1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
    }

    button {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      cursor: pointer;
      font-weight: 500;
    }

    button.ai-btn {
      background: linear-gradient(90deg, #10b981, #059669);
      font-size: 0.95rem;
      padding: 10px 16px;
      align-self: flex-start;
    }

    button.danger {
      background: linear-gradient(90deg, #ef4444, #dc2626);
    }

    .ticket-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 20px;
      margin: 16px 0;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
    }

    .ticket-item h3 { color: white; margin-bottom: 8px; }
    .ticket-item p { color: #cbd5e1; line-height: 1.5; }

    .meta { margin-top: 12px; font-size: 0.9rem; color: #94a3b8; }

    .actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

    @media (max-width: 840px) {
      #sidebar { width: 100%; height: auto; position: static; }
      #mainContent { margin-left: 0; padding: 20px; }
      .ticket-item { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- ─── LOGIN ─────────────────────────────────────── -->
  <div id="loginPage">
    <div class="login-card">
      <h1>IT Helpdesk AI</h1>
      <p style="color:#94a3b8; margin:16px 0 24px;">
        Username + Password<br><br>
        Admin → <strong>admin / admin</strong><br>
        User  → <strong>user1 / pass</strong>
      </p>

      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required autocomplete="off">
        <button type="submit">Sign In</button>
      </form>

      <p id="loginError" class="error"></p>
    </div>
  </div>

  <!-- ─── MAIN APP ──────────────────────────────────── -->
  <div id="appLayout" class="hidden">

    <div id="sidebar"></div>

    <div id="mainContent">

      <!-- Dashboard -->
      <div id="dashboardPage" class="section-card">
        <h1 id="dashboardTitle">Dashboard</h1>

        <div class="stats-grid">
          <div class="card"><h3>Total</h3><span id="statTotal">—</span></div>
          <div class="card"><h3>Open</h3><span id="statOpen">—</span></div>
          <div class="card"><h3>In Progress</h3><span id="statInProgress">—</span></div>
          <div class="card"><h3>Closed</h3><span id="statClosed">—</span></div>
        </div>

        <!-- Create Ticket (User) -->
        <div id="createTicketArea" class="hidden section-card">
          <h2>New Ticket</h2>
          <form id="createTicketForm">
            <input type="text" id="ticketTitle" placeholder="Title" required>
            <textarea id="ticketDesc" placeholder="Describe the issue..." rows="5" required></textarea>
            <button type="button" class="ai-btn" onclick="suggestPriorityAndSolution()">AI Suggest</button>
            <select id="ticketPriority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
            <button type="submit">Create Ticket</button>
          </form>
        </div>

        <!-- Manage Users (Admin) -->
        <div id="manageUsersArea" class="hidden section-card">
          <h2>Manage Users</h2>
          <form id="addUserForm" style="display:flex; gap:12px; flex-wrap:wrap; margin:20px 0;">
            <input type="text" id="newUsername" placeholder="Username" required style="flex:1; min-width:180px;">
            <input type="password" id="newPassword" placeholder="Password" required style="flex:1; min-width:180px;">
            <button type="submit">Add</button>
          </form>
          <div id="usersList"></div>
        </div>

        <!-- Knowledge Base -->
        <div id="knowledgeBaseArea" class="section-card">
          <h2>Troubleshooting & Common Issues</h2>
          <input type="text" id="kbSearch" placeholder="Search troubleshooting..." style="width:100%; max-width:400px; margin-bottom:20px;">
          <div id="knowledgeList"></div>
        </div>
      </div>

      <!-- Tickets View -->
      <div id="ticketsPage" class="section-card hidden">
        <h1 id="ticketsTitle">Tickets</h1>
        <input type="text" id="searchInput" placeholder="Search tickets..." style="width:100%; max-width:500px; margin-bottom:20px;">
        <div id="ticketsList"></div>
      </div>

    </div>
  </div>

  <script>
    // ─── DATA ───────────────────────────────────────────────

    const defaultUsers = [
      { id:1, username:'admin', password:'admin', role:'admin' },
      { id:2, username:'user1', password:'pass',  role:'user'  }
    ];

    const defaultKB = [
      { title:"Slow PC", text:"1. Close background apps\n2. Run disk cleanup\n3. Update graphics driver\n4. Scan for malware" },
      { title:"No Internet", text:"1. Restart router\n2. Forget & reconnect Wi-Fi\n3. Check IP (ipconfig /renew)\n4. Contact ISP if needed" },
      { title:"Printer Offline", text:"1. Check USB/Wi-Fi connection\n2. Set as default printer\n3. Run Windows Printer Troubleshooter" },
      { title:"Blue Screen", text:"1. Note error code\n2. Boot to safe mode\n3. Update drivers\n4. Check hardware (RAM)" }
    ];

    function initData() {
      if (!localStorage.users)    localStorage.users    = JSON.stringify(defaultUsers);
      if (!localStorage.tickets)  localStorage.tickets  = JSON.stringify([]);
      if (!localStorage.kb)       localStorage.kb       = JSON.stringify(defaultKB);
    }

    function getUsers()    { return JSON.parse(localStorage.users   || '[]'); }
    function saveUsers(u)  { localStorage.users   = JSON.stringify(u); }
    function getTickets()  { return JSON.parse(localStorage.tickets || '[]'); }
    function saveTickets(t){ localStorage.tickets = JSON.stringify(t); }
    function getKB()       { return JSON.parse(localStorage.kb      || '[]'); }
    function saveKB(k)     { localStorage.kb      = JSON.stringify(k); }

    let currentUser = null;

    // ─── AUTH ───────────────────────────────────────────────

    function tryLogin(username, password) {
      const user = getUsers().find(u => u.username === username && u.password === password);
      if (user) {
        currentUser = user;
        localStorage.currentUser = JSON.stringify(user);
        return true;
      }
      return false;
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('currentUser');
      showView('login');
    }

    function isAdmin() {
      return currentUser?.role === 'admin';
    }

    // ─── VIEWS ──────────────────────────────────────────────

    function showView(view) {
      document.querySelectorAll('#loginPage, #appLayout > *').forEach(el => el.classList.add('hidden'));

      if (view === 'login') {
        document.getElementById('loginPage').classList.remove('hidden');
        return;
      }

      document.getElementById('appLayout').classList.remove('hidden');
      document.getElementById('dashboardPage').classList.remove('hidden');

      // Sidebar
      const sb = document.getElementById('sidebar');
      sb.innerHTML = `
        <h2>IT Helpdesk AI</h2>
        <a href="#" ${view==='dashboard'?'class="active"':''} onclick="showView('dashboard');return false">Dashboard</a>
        <a href="#" ${view==='tickets'?'class="active"':''}   onclick="showView('tickets');return false">${isAdmin()?'All Tickets':'My Tickets'}</a>
        ${isAdmin() ? '<a href="#" onclick="showManageUsers();return false">Manage Users</a>' : ''}
        <a href="#" onclick="logout();return false">Logout</a>
      `;

      // Reset inner sections
      document.getElementById('createTicketArea').classList.add('hidden');
      document.getElementById('manageUsersArea').classList.add('hidden');

      if (view === 'tickets') {
        document.getElementById('dashboardPage').classList.add('hidden');
        document.getElementById('ticketsPage').classList.remove('hidden');
        renderTickets();
      } else if (view === 'dashboard') {
        updateDashboard();
        if (!isAdmin()) {
          document.getElementById('createTicketArea').classList.remove('hidden');
        }
      }
    }

    function showManageUsers() {
      document.getElementById('createTicketArea').classList.add('hidden');
      document.getElementById('manageUsersArea').classList.remove('hidden');
      renderUserList();
    }

    // ─── RENDER FUNCTIONS ───────────────────────────────────

    function updateDashboard() {
      const tickets = getTickets().filter(t => isAdmin() || t.createdBy === currentUser.id);
      const total  = tickets.length;
      const open   = tickets.filter(t => t.status === 'Open').length;
      const prog   = tickets.filter(t => t.status === 'In Progress').length;
      const closed = tickets.filter(t => t.status === 'Closed').length;

      document.getElementById('statTotal').textContent      = total;
      document.getElementById('statOpen').textContent       = open;
      document.getElementById('statInProgress').textContent = prog;
      document.getElementById('statClosed').textContent     = closed;
      document.getElementById('dashboardTitle').textContent = isAdmin() ? 'Admin Dashboard' : 'My Dashboard';
    }

    function renderTickets() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      let tickets = getTickets();

      if (!isAdmin()) tickets = tickets.filter(t => t.createdBy === currentUser.id);

      if (q) {
        tickets = tickets.filter(t =>
          t.title.toLowerCase().includes(q) ||
          t.description.toLowerCase().includes(q)
        );
      }

      document.getElementById('ticketsTitle').textContent = isAdmin() ? 'All Tickets' : 'My Tickets';

      const container = document.getElementById('ticketsList');
      container.innerHTML = tickets.length === 0
        ? '<p style="color:#94a3b8; padding:20px; text-align:center;">No tickets found.</p>'
        : tickets.map(t => `
          <div class="ticket-item">
            <div style="flex:1;">
              <h3>${t.title}</h3>
              <p>${t.description}</p>
              <div class="meta">
                <strong>${t.status}</strong> • ${t.priority} • ${new Date(t.createdAt).toLocaleString()}
              </div>
            </div>
            ${isAdmin() ? `
            <div class="actions">
              <select onchange="updateTicket(${t.id}, 'status', this.value)">
                <option ${t.status==='Open'?'selected':''}>Open</option>
                <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
                <option ${t.status==='Closed'?'selected':''}>Closed</option>
              </select>
              <select onchange="updateTicket(${t.id}, 'priority', this.value)">
                <option ${t.priority==='Low'?'selected':''}>Low</option>
                <option ${t.priority==='Medium'?'selected':''}>Medium</option>
                <option ${t.priority==='High'?'selected':''}>High</option>
              </select>
              <button class="ai-btn" onclick="suggestFixForTicket(${t.id})">AI Suggest Fix</button>
              <button class="danger" onclick="deleteTicket(${t.id})">Delete</button>
            </div>` : ''}
          </div>
        `).join('');
    }

    function renderUserList() {
      const users = getUsers().filter(u => u.role === 'user');
      document.getElementById('usersList').innerHTML = users.length === 0
        ? '<p style="color:#94a3b8;">No users yet.</p>'
        : users.map(u => `
          <div style="background:rgba(255,255,255,0.05); padding:12px; margin:10px 0; border-radius:8px; display:flex; justify-content:space-between;">
            <span>${u.username}</span>
            <button class="danger" onclick="deleteUser(${u.id})">Delete</button>
          </div>
        `).join('');
    }

    function renderKnowledgeBase() {
      const q = document.getElementById('kbSearch').value.toLowerCase().trim();
      const items = getKB().filter(item =>
        item.title.toLowerCase().includes(q) || item.text.toLowerCase().includes(q)
      );

      document.getElementById('knowledgeList').innerHTML = items.length === 0
        ? '<p style="color:#94a3b8; text-align:center;">No matching troubleshooting guides.</p>'
        : items.map(item => `
          <div class="section-card" style="margin:12px 0;">
            <h3 style="margin-bottom:12px;">${item.title}</h3>
            <p style="white-space: pre-line; color:#cbd5e1;">${item.text}</p>
            <button class="ai-btn" style="margin-top:12px;" onclick="alert('AI analysis not yet implemented for this item.')">Ask AI for more help</button>
          </div>
        `).join('');
    }

    // ─── ACTIONS ────────────────────────────────────────────

    function suggestPriorityAndSolution() {
      const desc = document.getElementById('ticketDesc').value.toLowerCase();
      if (!desc) return alert("Please write something first.");

      let priority = "Medium";
      let message = "AI Suggestion:\n\n";

      if (/urgent|critical|down|crash|emergency/i.test(desc)) {
        priority = "High";
        message += "→ This looks **urgent** → suggested **High** priority\n";
      } else if (/slow|lag|freeze|stuck/i.test(desc)) {
        priority = "Medium";
        message += "→ Performance issue detected → **Medium** priority\n";
      } else {
        message += "→ No urgency keywords detected → **Medium** priority\n";
      }

      // Very basic solution hint
      if (desc.includes("printer")) {
        message += "→ Printer issue? Check connection, drivers, queue\n";
      } else if (desc.includes("wifi") || desc.includes("internet")) {
        message += "→ Network? Restart router, renew IP, check cables\n";
      }

      document.getElementById('ticketPriority').value = priority;
      alert(message);
    }

    function suggestFixForTicket(ticketId) {
      const ticket = getTickets().find(t => t.id === ticketId);
      if (!ticket) return alert("Ticket not found.");

      const desc = ticket.description.toLowerCase();
      let msg = "AI Quick Fix Suggestion:\n\n";

      if (desc.includes("printer")) {
        msg += "1. Check printer is powered on and connected\n2. Clear print queue\n3. Reinstall driver\n";
      } else if (desc.includes("slow") || desc.includes("lag")) {
        msg += "1. Close background apps\n2. Update graphics driver\n3. Run disk cleanup / malware scan\n";
      } else if (desc.includes("blue") || desc.includes("crash")) {
        msg += "1. Note error code\n2. Boot to safe mode\n3. Update Windows & drivers\n";
      } else {
        msg += "No specific pattern detected. Try basic restart → update drivers → scan for malware.";
      }

      alert(msg);
    }

    function updateTicket(id, field, value) {
      let tickets = getTickets();
      const idx = tickets.findIndex(t => t.id === id);
      if (idx !== -1) {
        tickets[idx][field] = value;
        saveTickets(tickets);
        renderTickets();
        updateDashboard();
      }
    }

    function deleteTicket(id) {
      if (!confirm("Delete ticket permanently?")) return;
      saveTickets(getTickets().filter(t => t.id !== id));
      renderTickets();
      updateDashboard();
    }

    function deleteUser(id) {
      if (!confirm("Delete user?")) return;
      saveUsers(getUsers().filter(u => u.id !== id));
      renderUserList();
    }

    // ─── INIT & EVENTS ──────────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      initData();

      // Session resume
      try {
        const stored = localStorage.currentUser;
        if (stored) {
          currentUser = JSON.parse(stored);
          if (getUsers().some(u => u.id === currentUser.id)) {
            showView('dashboard');
          } else {
            localStorage.removeItem('currentUser');
          }
        }
      } catch {}

      if (!currentUser) showView('login');

      // Login
      document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const un = document.getElementById('username').value.trim();
        const pw = document.getElementById('password').value;
        if (tryLogin(un, pw)) {
          showView('dashboard');
        } else {
          document.getElementById('loginError').textContent = 'Wrong username or password';
        }
      });

      // New ticket
      document.getElementById('createTicketForm').addEventListener('submit', e => {
        e.preventDefault();
        const title = document.getElementById('ticketTitle').value.trim();
        const desc  = document.getElementById('ticketDesc').value.trim();
        const prio  = document.getElementById('ticketPriority').value;

        if (!title || !desc) return alert("Title and description are required.");

        const tickets = getTickets();
        tickets.push({
          id: Date.now(),
          title,
          description: desc,
          status: 'Open',
          priority: prio,
          createdBy: currentUser.id,
          createdAt: new Date().toISOString()
        });
        saveTickets(tickets);
        e.target.reset();
        alert("Ticket created.");
        updateDashboard();
      });

      // Add user
      document.getElementById('addUserForm').addEventListener('submit', e => {
        e.preventDefault();
        const un = document.getElementById('newUsername').value.trim();
        const pw = document.getElementById('newPassword').value;

        if (!un || !pw) return alert("Both fields required.");

        const users = getUsers();
        if (users.some(u => u.username === un)) return alert("Username already taken.");

        const id = Math.max(0, ...users.map(u=>u.id)) + 1;
        users.push({ id, username: un, password: pw, role: 'user' });
        saveUsers(users);
        alert("User added.");
        renderUserList();
        e.target.reset();
      });

      // Search listeners
      document.getElementById('searchInput')?.addEventListener('input', renderTickets);
      document.getElementById('kbSearch')?.addEventListener('input', renderKnowledgeBase);
    });
  </script>
</body>
</html>
