<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Helpdesk – Login</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      <h1>IT Helpdesk</h1>
      <p style="color:#666; margin: 8px 0 24px; font-size:0.95em;">
        Default credentials:<br>
        <strong>Admin</strong> → admin / admin<br>
        <strong>User</strong> → user1 / pass
      </p>

      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required autocomplete="off">
        <button type="submit">Login</button>
      </form>

      <p id="errorMsg" class="error"></p>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initStorage();

      const form = document.getElementById('loginForm');
      const errorMsg = document.getElementById('errorMsg');

      form.addEventListener('submit', e => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        const result = login(username, password);

        if (result.success) {
          window.location.href = result.role === 'admin' ? '/admin.html' : '/user.html';
        } else {
          errorMsg.textContent = result.message || 'Invalid credentials';
        }
      });
    });
  </script>
</body>
</html>
