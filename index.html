<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldTech ServiceDesk - FIXED</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f23;
      color: #e0e0ff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #login, #app { 
      background: rgba(30,30,60,0.9);
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(100,100,255,0.3);
      width: 90%;
      max-width: 420px;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 8px;
      font-size: 1.1rem;
      border: 1px solid #444;
    }
    button {
      background: #6366f1;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #7c5cf6; }
    .hidden { display: none; }
    .error { color: #ff6b6b; }
    #aiAnswer {
      margin-top: 24px;
      padding: 16px;
      background: rgba(99,102,241,0.15);
      border-radius: 12px;
      white-space: pre-wrap;
      text-align: left;
    }
  </style>
</head>
<body>

  <div id="login">
    <h2>WorldTech Login</h2>
    <p style="color:#aaa;margin-bottom:24px">
      admin / admin<br>
      user1 / pass
    </p>
    <input id="username" placeholder="Username" autocomplete="off">
    <input id="password" type="password" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <p id="loginErr" class="error"></p>
  </div>

  <div id="app" class="hidden">
    <h2>Welcome, <span id="userName"></span></h2>
    <p>Real AI test button (Groq Llama 3)</p>
    <textarea id="aiPrompt" rows="3" placeholder="Ask anything..."></textarea>
    <button onclick="askRealAI()">Ask AI</button>
    <div id="aiAnswer"></div>

    <button onclick="logout()" style="margin-top:32px;background:#e53e3e">Logout</button>
  </div>

  <script>
    const GROQ_KEY = 'gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'; // ← PASTE YOUR REAL KEY HERE

    function doLogin() {
      const un = document.getElementById('username').value.trim();
      const pw = document.getElementById('password').value.trim();

      if ((un === 'admin' && pw === 'admin') || (un === 'user1' && pw === 'pass')) {
        localStorage.setItem('currentUser', un);
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('userName').textContent = un;
      } else {
        document.getElementById('loginErr').textContent = 'Wrong username or password';
      }
    }

    function logout() {
      localStorage.removeItem('currentUser');
      location.reload();
    }

    async function askRealAI() {
      const prompt = document.getElementById('aiPrompt').value.trim();
      if (!prompt) return alert("Type something");

      const answerDiv = document.getElementById('aiAnswer');
      answerDiv.textContent = "AI is thinking...";

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${GROQ_KEY}`
          },
          body: JSON.stringify({
            model: 'llama3-8b-8192',
            messages: [
              { role: 'system', content: 'You are a helpful assistant.' },
              { role: 'user', content: prompt }
            ],
            temperature: 0.7,
            max_tokens: 400
          })
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const data = await res.json();
        answerDiv.textContent = data.choices[0].message.content.trim();
      } catch (err) {
        answerDiv.textContent = 'Error: ' + err.message + '\n\nCheck your Groq API key.';
      }
    }

    // Auto-login if already logged in
    if (localStorage.getItem('currentUser')) {
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('userName').textContent = localStorage.getItem('currentUser');
    }
  </script>
</body>
</html>
