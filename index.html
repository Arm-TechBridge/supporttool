<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WorldTech AI ServiceDesk</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<style>

:root{
--bg:#0f1117;
--card:#1c2230;
--accent:#00eaff;
--text:#e6e8ee;
}

body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#0f1117,#151a2b);
color:var(--text);
}

/* LOGIN */

#login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:rgba(255,255,255,.05);
padding:40px;
border-radius:12px;
backdrop-filter:blur(15px);
width:300px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#111520;
border:none;
border-radius:6px;
color:white;
}

button{
margin-top:12px;
padding:10px;
border:none;
border-radius:6px;
background:linear-gradient(45deg,#00eaff,#7a5cff);
color:white;
cursor:pointer;
}

/* LAYOUT */

#app{
display:none;
}

.sidebar{
width:220px;
background:#111520;
position:fixed;
top:0;
bottom:0;
padding:20px;
}

.sidebar h2{
font-family:Orbitron;
color:#00eaff;
}

.sidebar a{
display:block;
padding:10px;
margin-top:6px;
border-radius:6px;
cursor:pointer;
}

.sidebar a:hover{
background:#20263a;
}

.main{
margin-left:240px;
padding:20px;
}

/* CARDS */

.card{
background:rgba(255,255,255,.05);
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
}

.stat{
background:#121727;
padding:20px;
border-radius:10px;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #2a3040;
}

.chatbox{
height:220px;
overflow:auto;
background:#0c0f16;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

#calendar{
background:white;
color:black;
border-radius:10px;
padding:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login">
<div class="login-box">

<h2>WorldTech Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="font-size:12px;margin-top:10px;">
Admin: admin / admin123
</p>

</div>
</div>


<!-- APP -->

<div id="app">

<div class="sidebar">

<h2>WorldTech</h2>

<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('tickets')">Tickets</a>
<a onclick="showPage('createTicket')">Create Ticket</a>
<a onclick="showPage('knowledge')">AI Help</a>
<a onclick="showPage('calendarPage')">Calendar</a>
<a onclick="showPage('notesPage')">Notes</a>

<button onclick="logout()">Logout</button>

</div>

<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h2>Dashboard</h2>

<div class="stats">

<div class="stat">Total <h3 id="totalTickets"></h3></div>
<div class="stat">Open <h3 id="openTickets"></h3></div>
<div class="stat">In Progress <h3 id="progressTickets"></h3></div>
<div class="stat">Closed <h3 id="closedTickets"></h3></div>

</div>

</div>


<!-- TICKETS -->

<div id="tickets" class="page" style="display:none">

<h2>Tickets</h2>

<button onclick="exportCSV()">Export CSV</button>

<table>

<thead>
<tr>
<th>Title</th>
<th>Status</th>
<th>Priority</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="ticketTable"></tbody>

</table>

</div>


<!-- CREATE TICKET -->

<div id="createTicket" class="page" style="display:none">

<h2>Create Ticket</h2>

<input id="tTitle" placeholder="Title">
<textarea id="tDesc" placeholder="Description"></textarea>

<button onclick="voiceInput()">🎤 Voice</button>

<select id="tPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<select id="tCategory">
<option>Network</option>
<option>Software</option>
<option>Hardware</option>
</select>

<button onclick="createTicket()">Submit Ticket</button>

</div>


<!-- AI HELP -->

<div id="knowledge" class="page" style="display:none">

<h2>AI IT Assistant</h2>

<div class="chatbox" id="chat"></div>

<input id="chatInput" placeholder="Ask any IT issue">

<button onclick="askAI()">Ask AI</button>

</div>


<!-- CALENDAR -->

<div id="calendarPage" class="page" style="display:none">

<h2>Calendar</h2>

<div id="calendar"></div>

</div>


<!-- NOTES -->

<div id="notesPage" class="page" style="display:none">

<h2>Notes</h2>

<textarea id="notesArea" rows="10"></textarea>

<button onclick="saveNotes()">Save Notes</button>

</div>

</div>
</div>


<script>

/* ==========================
DEFAULT USERS AUTO CREATE
========================== */

let users = JSON.parse(localStorage.getItem("users"));

if(!users){

users = [

{username:"admin",password:"admin123",role:"admin"},
{username:"user1",password:"pass123",role:"user"}

];

localStorage.setItem("users",JSON.stringify(users));

}

let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

let currentUser=null;

/* LOGIN */

function login(){

let u=username.value;
let p=password.value;

let user=users.find(x=>x.username===u && x.password===p);

if(!user){
alert("Invalid login");
return;
}

currentUser=user;

login.style.display="none";
app.style.display="block";

init();

}

/* LOGOUT */

function logout(){
location.reload();
}

/* NAVIGATION */

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.style.display="none");

document.getElementById(page).style.display="block";

}

/* INIT */

function init(){

renderTickets();
updateStats();
loadNotes();
initCalendar();

}

/* CREATE TICKET */

function createTicket(){

let ticket={

id:Date.now(),
title:tTitle.value,
desc:tDesc.value,
priority:tPriority.value,
category:tCategory.value,
status:"Open",
owner:currentUser.username

};

tickets.push(ticket);

saveTickets();

renderTickets();

alert("Ticket created");

}

/* RENDER TICKETS */

function renderTickets(){

ticketTable.innerHTML="";

tickets.forEach(t=>{

let row=`
<tr>
<td>${t.title}</td>
<td>${t.status}</td>
<td>${t.priority}</td>
<td>
<button onclick="deleteTicket(${t.id})">Delete</button>
</td>
</tr>
`;

ticketTable.innerHTML+=row;

});

updateStats();

}

function deleteTicket(id){

if(!confirm("Delete ticket?"))return;

tickets=tickets.filter(t=>t.id!=id);

saveTickets();

renderTickets();

}

function saveTickets(){

localStorage.setItem("tickets",JSON.stringify(tickets));

}

/* DASHBOARD STATS */

function updateStats(){

totalTickets.innerText=tickets.length;

openTickets.innerText=tickets.filter(t=>t.status==="Open").length;

progressTickets.innerText=tickets.filter(t=>t.status==="In Progress").length;

closedTickets.innerText=tickets.filter(t=>t.status==="Closed").length;

}

/* CSV EXPORT */

function exportCSV(){

let csv="Title,Status,Priority\n";

tickets.forEach(t=>{
csv+=`${t.title},${t.status},${t.priority}\n`;
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="tickets.csv";

a.click();

}

/* VOICE INPUT */

function voiceInput(){

let rec=new webkitSpeechRecognition();

rec.onresult=e=>{
tDesc.value+=e.results[0][0].transcript;
};

rec.start();

}

/* AI PLACEHOLDER */

const GROQ_API_KEY="PASTE_GROQ_API_KEY_HERE";

async function askAI(){

if(GROQ_API_KEY==="PASTE_GROQ_API_KEY_HERE"){
alert("Add Groq API key in code");
return;
}

let q=chatInput.value;

chat.innerHTML+=`<div>User: ${q}</div>`;

let res=await fetch("https://api.groq.com/openai/v1/chat/completions",{

method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_API_KEY
},
body:JSON.stringify({
model:"llama3-8b-8192",
messages:[{role:"user",content:q}]
})

});

let data=await res.json();

let reply=data.choices[0].message.content;

chat.innerHTML+=`<div>AI: ${reply}</div>`;

}

/* NOTES */

function saveNotes(){

localStorage.setItem("notes",notesArea.value);

}

function loadNotes(){

notesArea.value=localStorage.getItem("notes") || "";

}

/* CALENDAR */

function initCalendar(){

let calendarEl=document.getElementById("calendar");

let events=JSON.parse(localStorage.getItem("events")||"[]");

let calendar=new FullCalendar.Calendar(calendarEl,{

initialView:"dayGridMonth",

events:events,

dateClick:function(info){

let title=prompt("Event title");

if(!title)return;

let event={title:title,start:info.dateStr};

events.push(event);

localStorage.setItem("events",JSON.stringify(events));

calendar.addEvent(event);

}

});

calendar.render();

}

</script>

</body>
</html>
