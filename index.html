<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>WorldTech ServiceDesk</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#0f1117;
color:white;
}

h2{font-family:Orbitron}

input,textarea,select{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:5px;
background:#1f253a;
color:white;
}

button{
padding:10px;
margin-top:10px;
background:#00eaff;
border:none;
border-radius:5px;
cursor:pointer;
}

/* LOGIN */

#login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#151a2b;
padding:40px;
border-radius:10px;
width:300px;
}

/* LAYOUT */

#app{
display:none;
}

.sidebar{
position:fixed;
top:0;
bottom:0;
width:220px;
background:#121727;
padding:20px;
}

.sidebar a{
display:block;
padding:10px;
cursor:pointer;
margin-top:6px;
}

.main{
margin-left:240px;
padding:20px;
}

.card{
background:#151a2b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

.chat{
background:#0c0f16;
height:200px;
overflow:auto;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

<div class="login-box">

<h2>WorldTech Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>admin / admin123</p>

</div>

</div>


<!-- APP -->

<div id="app">

<div class="sidebar">

<h2>WorldTech</h2>

<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('tickets')">Tickets</a>
<a onclick="showPage('create')">Create Ticket</a>
<a onclick="showPage('ai')">AI Help</a>
<a onclick="showPage('notes')">Notes</a>
<a onclick="showPage('profile')">Profile</a>

<button onclick="logout()">Logout</button>

</div>


<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h2>Dashboard</h2>

<div class="stats">

<div class="card">
Total Tickets
<h3 id="statTotal"></h3>
</div>

<div class="card">
Open
<h3 id="statOpen"></h3>
</div>

<div class="card">
Closed
<h3 id="statClosed"></h3>
</div>

</div>

</div>


<!-- TICKETS -->

<div id="tickets" class="page" style="display:none">

<h2>Tickets</h2>

<input id="search" placeholder="Search tickets" onkeyup="renderTickets()">

<button onclick="exportCSV()">Export CSV</button>

<table>

<thead>
<tr>
<th>Title</th>
<th>Status</th>
<th>Priority</th>
<th>Action</th>
</tr>
</thead>

<tbody id="ticketTable"></tbody>

</table>

</div>


<!-- CREATE -->

<div id="create" class="page" style="display:none">

<h2>Create Ticket</h2>

<input id="tTitle" placeholder="Title">

<textarea id="tDesc" placeholder="Description"></textarea>

<button onclick="voiceInput()">🎤 Voice Input</button>

<select id="tPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button onclick="createTicket()">Create Ticket</button>

</div>


<!-- AI -->

<div id="ai" class="page" style="display:none">

<h2>AI Helpdesk</h2>

<div class="chat" id="chat"></div>

<input id="chatInput" placeholder="Ask an IT question">

<button onclick="askAI()">Ask AI</button>

</div>


<!-- NOTES -->

<div id="notes" class="page" style="display:none">

<h2>Notes</h2>

<textarea id="notesArea" rows="10"></textarea>

<button onclick="saveNotes()">Save</button>

</div>


<!-- PROFILE -->

<div id="profile" class="page" style="display:none">

<h2>Profile</h2>

<input id="profileUser">
<input id="profilePass">

<button onclick="saveProfile()">Save</button>

</div>

</div>
</div>


<script>

/* USER SYSTEM */

let users = JSON.parse(localStorage.getItem("users")) || [];

/* ensure admin exists */

if(!users.find(u=>u.username==="admin")){
users.push({username:"admin",password:"admin123",role:"admin"});
}

if(!users.find(u=>u.username==="user1")){
users.push({username:"user1",password:"pass123",role:"user"});
}

localStorage.setItem("users",JSON.stringify(users));

let currentUser=null;

/* LOGIN */

function login(){

let u=username.value.trim();
let p=password.value.trim();

let user=users.find(x=>x.username===u && x.password===p);

if(!user){
alert("Invalid login");
return;
}

currentUser=user;

login.style.display="none";
app.style.display="block";

init();

}

/* LOGOUT */

function logout(){
location.reload();
}

/* NAV */

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.style.display="none");

document.getElementById(id).style.display="block";

}

/* DATABASE */

let tickets=JSON.parse(localStorage.getItem("tickets"))||[];

/* INIT */

function init(){

renderTickets();
updateStats();
loadNotes();

}

/* CREATE TICKET */

function createTicket(){

let ticket={

id:Date.now(),
title:tTitle.value,
desc:tDesc.value,
priority:tPriority.value,
status:"Open"

};

tickets.push(ticket);

localStorage.setItem("tickets",JSON.stringify(tickets));

renderTickets();

alert("Ticket created");

}

/* RENDER */

function renderTickets(){

let search=document.getElementById("search")?.value?.toLowerCase()||"";

ticketTable.innerHTML="";

tickets
.filter(t=>t.title.toLowerCase().includes(search))
.forEach(t=>{

ticketTable.innerHTML+=`

<tr>
<td>${t.title}</td>
<td>${t.status}</td>
<td>${t.priority}</td>
<td>

<button onclick="closeTicket(${t.id})">Close</button>
<button onclick="deleteTicket(${t.id})">Delete</button>

</td>
</tr>

`;

});

updateStats();

}

/* CLOSE */

function closeTicket(id){

let t=tickets.find(x=>x.id===id);

t.status="Closed";

localStorage.setItem("tickets",JSON.stringify(tickets));

renderTickets();

}

/* DELETE */

function deleteTicket(id){

tickets=tickets.filter(x=>x.id!==id);

localStorage.setItem("tickets",JSON.stringify(tickets));

renderTickets();

}

/* STATS */

function updateStats(){

statTotal.innerText=tickets.length;
statOpen.innerText=tickets.filter(t=>t.status==="Open").length;
statClosed.innerText=tickets.filter(t=>t.status==="Closed").length;

}

/* CSV */

function exportCSV(){

let csv="Title,Status,Priority\n";

tickets.forEach(t=>{
csv+=`${t.title},${t.status},${t.priority}\n`;
});

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="tickets.csv";

a.click();

}

/* VOICE */

function voiceInput(){

let rec=new webkitSpeechRecognition();

rec.onresult=e=>{
tDesc.value+=e.results[0][0].transcript;
};

rec.start();

}

/* AI */

const GROQ_API_KEY="PASTE_GROQ_API_KEY";

async function askAI(){

let q=chatInput.value;

chat.innerHTML+=`<div>User: ${q}</div>`;

if(GROQ_API_KEY==="PASTE_GROQ_API_KEY"){
chat.innerHTML+=`<div>AI: Add Groq API key</div>`;
return;
}

let res=await fetch("https://api.groq.com/openai/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_API_KEY
},

body:JSON.stringify({
model:"llama3-8b-8192",
messages:[{role:"user",content:q}]
})

});

let data=await res.json();

let reply=data.choices[0].message.content;

chat.innerHTML+=`<div>AI: ${reply}</div>`;

}

/* NOTES */

function saveNotes(){

localStorage.setItem("notes",notesArea.value);

}

function loadNotes(){

notesArea.value=localStorage.getItem("notes")||"";

}

/* PROFILE */

function saveProfile(){

currentUser.username=profileUser.value;
currentUser.password=profilePass.value;

localStorage.setItem("users",JSON.stringify(users));

alert("Saved");

}

</script>

</body>
</html>
