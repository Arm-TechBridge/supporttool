<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldTech ServiceDesk</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Inter&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: white;
    }
    h2 { font-family: 'Orbitron', sans-serif; color: #00eaff; }
    input, textarea, select {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      background: #1f253a;
      color: white;
      font-size: 1rem;
    }
    button {
      padding: 12px 20px;
      margin-top: 12px;
      background: #00eaff;
      color: #0f1117;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }
    button:hover { background: #00c4ff; transform: translateY(-1px); }

    /* LOGIN */
    #login {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #0f1117, #1a1f2e);
    }
    .login-box {
      background: #151a2b;
      padding: 50px 40px;
      border-radius: 12px;
      width: 360px;
      box-shadow: 0 0 30px rgba(0, 234, 255, 0.15);
      text-align: center;
    }

    /* LAYOUT */
    #app { display: none; }
    .sidebar {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 240px;
      background: #121727;
      padding: 30px 20px;
      overflow-y: auto;
    }
    .sidebar a {
      display: block;
      padding: 14px 18px;
      cursor: pointer;
      margin-top: 8px;
      color: #b0b8c4;
      border-radius: 8px;
      transition: all 0.2s;
    }
    .sidebar a:hover, .sidebar a.active {
      background: rgba(0, 234, 255, 0.1);
      color: #00eaff;
    }
    .main {
      margin-left: 240px;
      padding: 30px;
    }

    .card {
      background: #151a2b;
      padding: 24px;
      border-radius: 10px;
      margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 20px;
      margin: 30px 0;
    }
    .stat-card {
      background: #1f253a;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }
    .stat-card h3 {
      color: #00eaff;
      margin: 8px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    td, th {
      padding: 14px;
      border-bottom: 1px solid #2a3345;
      text-align: left;
    }
    th { background: #1a1f2e; }

    .chat {
      background: #0c0f16;
      height: 280px;
      overflow-y: auto;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
      border: 1px solid #2a3345;
    }
    .chat div {
      margin: 12px 0;
      padding: 12px;
      border-radius: 8px;
    }
    .chat .user { background: #1f253a; text-align: right; }
    .chat .ai { background: rgba(0,234,255,0.08); }

    .page { display: none; }
    .page.active { display: block; }

    .voice-btn {
      background: #ff6b6b;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h2>WorldTech Login</h2>
    <input id="username" placeholder="Username" autocomplete="off">
    <input id="password" type="password" placeholder="Password">
    <button onclick="doLogin()">Login</button>
    <p style="margin-top:20px;color:#94a3b8">Default:<br>admin / admin123<br>user1 / pass123</p>
    <p id="loginError" style="color:#ff6b6b;margin-top:12px;"></p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="sidebar">
    <h2>WorldTech</h2>
    <a onclick="showPage('dashboard')" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a onclick="showPage('tickets')"><i class="fas fa-ticket-alt"></i> Tickets</a>
    <a onclick="showPage('create')"><i class="fas fa-plus-circle"></i> Create Ticket</a>
    <a onclick="showPage('ai')"><i class="fas fa-robot"></i> AI Helpdesk</a>
    <a onclick="showPage('notes')"><i class="fas fa-sticky-note"></i> Notes</a>
    <a onclick="showPage('profile')"><i class="fas fa-user"></i> Profile</a>
    <button onclick="logout()" style="width:100%;margin-top:20px;background:#e53e3e;color:white">Logout</button>
  </div>

  <div class="main">

    <!-- DASHBOARD -->
    <div id="dashboard" class="page active">
      <h2>Dashboard</h2>
      <div class="stats">
        <div class="stat-card">
          Total Tickets
          <h3 id="statTotal">0</h3>
        </div>
        <div class="stat-card">
          Open
          <h3 id="statOpen">0</h3>
        </div>
        <div class="stat-card">
          Closed
          <h3 id="statClosed">0</h3>
        </div>
      </div>
    </div>

    <!-- TICKETS -->
    <div id="tickets" class="page">
      <h2>Tickets</h2>
      <input id="search" placeholder="Search tickets..." onkeyup="renderTickets()">
      <button onclick="exportCSV()" style="margin:12px 0">Export to CSV</button>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="ticketTable"></tbody>
      </table>
    </div>

    <!-- CREATE TICKET -->
    <div id="create" class="page">
      <h2>Create Ticket</h2>
      <input id="tTitle" placeholder="Title">
      <textarea id="tDesc" placeholder="Description"></textarea>
      <button class="voice-btn" onclick="voiceInput()">🎤 Voice Input</button>
      <select id="tPriority">
        <option>Low</option>
        <option>Medium</option>
        <option>High</option>
      </select>
      <button onclick="createTicket()">Create Ticket</button>
    </div>

    <!-- AI HELPDESK -->
    <div id="ai" class="page">
      <h2>AI Helpdesk</h2>
      <div class="chat" id="chat"></div>
      <input id="chatInput" placeholder="Ask any IT question...">
      <button onclick="askAI()">Ask AI</button>
    </div>

    <!-- NOTES -->
    <div id="notes" class="page">
      <h2>Notes</h2>
      <textarea id="notesArea" rows="12"></textarea>
      <button onclick="saveNotes()">Save Notes</button>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="page">
      <h2>Profile</h2>
      <input id="profileUser" placeholder="Username">
      <input id="profilePass" type="password" placeholder="New Password">
      <button onclick="saveProfile()">Save Profile</button>
    </div>

  </div>
</div>

<script>
// ==================== STATE ====================
let users = JSON.parse(localStorage.getItem("users")) || [];
let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
let currentUser = null;

// Ensure default admin & user
if (!users.find(u => u.username === "admin")) {
  users.push({ username: "admin", password: "admin123", role: "admin" });
}
if (!users.find(u => u.username === "user1")) {
  users.push({ username: "user1", password: "pass123", role: "user" });
}
localStorage.setItem("users", JSON.stringify(users));

// ==================== LOGIN ====================
function doLogin() {
  const usernameEl = document.getElementById('username');
  const passwordEl = document.getElementById('password');
  const errorEl = document.getElementById('loginError');

  const u = usernameEl.value.trim();
  const p = passwordEl.value.trim();

  const user = users.find(x => x.username === u && x.password === p);

  if (!user) {
    errorEl.textContent = "Invalid username or password";
    return;
  }

  currentUser = user;
  localStorage.setItem("currentUser", JSON.stringify(currentUser));

  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  initApp();
}

// Auto-login if session exists
const storedUser = localStorage.getItem("currentUser");
if (storedUser) {
  currentUser = JSON.parse(storedUser);
  if (users.some(u => u.username === currentUser.username)) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  }
}

// ==================== LOGOUT ====================
function logout() {
  localStorage.removeItem("currentUser");
  location.reload();
}

// ==================== PAGE SWITCHER ====================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ==================== APP INIT ====================
function initApp() {
  updateStats();
  renderTickets();
  loadNotes();
}

// ==================== TICKETS ====================
function createTicket() {
  const title = document.getElementById('tTitle').value.trim();
  const desc = document.getElementById('tDesc').value.trim();
  const priority = document.getElementById('tPriority').value;

  if (!title || !desc) {
    alert("Title and description required");
    return;
  }

  const ticket = {
    id: Date.now(),
    title,
    description: desc,
    priority,
    status: "Open",
    createdBy: currentUser.username,
    createdAt: new Date().toISOString()
  };

  tickets.push(ticket);
  localStorage.setItem("tickets", JSON.stringify(tickets));

  document.getElementById('tTitle').value = '';
  document.getElementById('tDesc').value = '';

  renderTickets();
  updateStats();
  alert("Ticket created successfully!");
}

function renderTickets() {
  const search = document.getElementById('search')?.value?.toLowerCase() || '';
  const tbody = document.getElementById('ticketTable');
  tbody.innerHTML = '';

  tickets
    .filter(t => t.title.toLowerCase().includes(search) || t.description.toLowerCase().includes(search))
    .forEach(t => {
      const row = document.createElement('tr');
      row.innerHTML = `
        <td>${t.title}</td>
        <td>${t.status}</td>
        <td>${t.priority}</td>
        <td>
          ${currentUser.role === 'admin' ? `
            <button onclick="closeTicket(${t.id})" style="background:#10b981;color:white">Close</button>
            <button onclick="deleteTicket(${t.id})" style="background:#e53e3e;color:white">Delete</button>
          ` : 'View Only'}
        </td>
      `;
      tbody.appendChild(row);
    });

  updateStats();
}

function closeTicket(id) {
  const ticket = tickets.find(t => t.id === id);
  if (ticket) {
    ticket.status = "Closed";
    localStorage.setItem("tickets", JSON.stringify(tickets));
    renderTickets();
  }
}

function deleteTicket(id) {
  if (!confirm("Delete this ticket?")) return;
  tickets = tickets.filter(t => t.id !== id);
  localStorage.setItem("tickets", JSON.stringify(tickets));
  renderTickets();
}

function updateStats() {
  const total = tickets.length;
  const open = tickets.filter(t => t.status === "Open").length;
  const closed = tickets.filter(t => t.status === "Closed").length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statOpen').textContent = open;
  document.getElementById('statClosed').textContent = closed;
}

// ==================== CSV EXPORT ====================
function exportCSV() {
  let csv = "Title,Description,Status,Priority,Created By,Date\n";
  tickets.forEach(t => {
    csv += `"${t.title.replace(/"/g,'""')}","${t.description.replace(/"/g,'""')}",${t.status},${t.priority},${t.createdBy},${new Date(t.createdAt).toLocaleString()}\n`;
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'worldtech_tickets.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ==================== VOICE INPUT ====================
function voiceInput() {
  if (!('webkitSpeechRecognition' in window)) {
    alert("Voice input not supported in this browser. Try Chrome.");
    return;
  }

  const recognition = new webkitSpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onresult = e => {
    const transcript = e.results[0][0].transcript;
    document.getElementById('tDesc').value += transcript + ' ';
  };

  recognition.onerror = e => alert("Voice error: " + e.error);

  recognition.start();
}

// ==================== AI HELPDESK (Groq) ====================
const GROQ_API_KEY = "gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"; // ← PASTE YOUR REAL KEY HERE

async function askAI() {
  const input = document.getElementById('chatInput');
  const chat = document.getElementById('chat');
  const question = input.value.trim();

  if (!question) return;

  chat.innerHTML += `<div class="user">You: ${question}</div>`;
  input.value = '';

  if (GROQ_API_KEY === "PASTE_GROQ_API_KEY") {
    chat.innerHTML += `<div class="ai">AI: Please add your real Groq API key in the code!</div>`;
    return;
  }

  try {
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${GROQ_API_KEY}`
      },
      body: JSON.stringify({
        model: "llama3-8b-8192",
        messages: [
          { role: "system", content: "You are an expert IT support assistant. Give clear, numbered step-by-step answers." },
          { role: "user", content: question }
        ],
        temperature: 0.7,
        max_tokens: 500
      })
    });

    if (!res.ok) throw new Error(`API error ${res.status}`);

    const data = await res.json();
    const answer = data.choices[0].message.content.trim();

    chat.innerHTML += `<div class="ai">AI: ${answer}</div>`;
  } catch (err) {
    chat.innerHTML += `<div class="ai" style="color:#ff6b6b">AI Error: ${err.message}</div>`;
  }

  chat.scrollTop = chat.scrollHeight;
}

// ==================== NOTES ====================
function saveNotes() {
  const notes = document.getElementById('notesArea').value;
  localStorage.setItem("notes", notes);
  alert("Notes saved!");
}

function loadNotes() {
  const notes = localStorage.getItem("notes") || "";
  document.getElementById('notesArea').value = notes;
}

// ==================== PROFILE ====================
function saveProfile() {
  const newUser = document.getElementById('profileUser').value.trim();
  const newPass = document.getElementById('profilePass').value.trim();

  if (!newUser || !newPass) {
    alert("Both fields required");
    return;
  }

  currentUser.username = newUser;
  currentUser.password = newPass;

  // Update in users array
  const users = getUsers();
  const idx = users.findIndex(u => u.id === currentUser.id);
  if (idx !== -1) {
    users[idx] = currentUser;
    localStorage.setItem("users", JSON.stringify(users));
  }

  localStorage.setItem("currentUser", JSON.stringify(currentUser));
  alert("Profile updated! Please login again with new credentials.");
  logout();
}

// ==================== INIT ====================
function init() {
  // Load notes
  loadNotes();

  // Load profile fields
  document.getElementById('profileUser').value = currentUser.username;
  document.getElementById('profilePass').value = currentUser.password;

  updateStats();
  renderTickets();
}

// Make sure init runs after login
if (currentUser) init();
  </script>
</body>
</html>
