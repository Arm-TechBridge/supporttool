<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>WorldTech AI ServiceDesk</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

<style>

body{
margin:0;
font-family:Inter;
background:#0f1117;
color:white;
}

h2{font-family:Orbitron}

#login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:#151a2b;
padding:40px;
border-radius:10px;
width:320px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#1f253a;
border:none;
border-radius:6px;
color:white;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
background:#00eaff;
color:black;
cursor:pointer;
}

.sidebar{
position:fixed;
width:220px;
top:0;
bottom:0;
background:#121727;
padding:20px;
}

.sidebar a{
display:block;
padding:10px;
margin-top:6px;
cursor:pointer;
}

.main{
margin-left:240px;
padding:20px;
}

.card{
background:#151a2b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #333;
}

.chat{
height:200px;
overflow:auto;
background:#0c0f16;
padding:10px;
border-radius:8px;
margin-bottom:10px;
}

#calendar{
background:white;
color:black;
padding:10px;
border-radius:10px;
}

</style>

</head>

<body>


<!-- LOGIN -->

<div id="login">

<div class="login-box">

<h2>WorldTech Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="font-size:12px">
admin / admin123
</p>

</div>

</div>


<!-- APP -->

<div id="app" style="display:none">

<div class="sidebar">

<h2>WorldTech</h2>

<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('tickets')">Tickets</a>
<a onclick="showPage('create')">Create Ticket</a>
<a onclick="showPage('ai')">AI Help</a>
<a onclick="showPage('calendarPage')">Calendar</a>
<a onclick="showPage('notes')">Notes</a>
<a onclick="showPage('profile')">Profile</a>

<button onclick="logout()">Logout</button>

</div>


<div class="main">

<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h2>Dashboard</h2>

<div class="stats">

<div class="card">Total <h3 id="statTotal"></h3></div>
<div class="card">Open <h3 id="statOpen"></h3></div>
<div class="card">Closed <h3 id="statClosed"></h3></div>

</div>

</div>


<!-- TICKETS -->

<div id="tickets" class="page" style="display:none">

<h2>Tickets</h2>

<input id="searchTicket" placeholder="Search ticket" onkeyup="renderTickets()">

<button onclick="exportCSV()">Export CSV</button>

<table>

<thead>
<tr>
<th>Title</th>
<th>Status</th>
<th>Priority</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="ticketTable"></tbody>

</table>

</div>


<!-- CREATE -->

<div id="create" class="page" style="display:none">

<h2>Create Ticket</h2>

<input id="tTitle" placeholder="Title">
<textarea id="tDesc" placeholder="Description"></textarea>

<button onclick="voiceInput()">🎤 Voice</button>

<select id="tPriority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button onclick="createTicket()">Create</button>

</div>


<!-- AI -->

<div id="ai" class="page" style="display:none">

<h2>AI Helpdesk</h2>

<div class="chat" id="chat"></div>

<input id="chatInput" placeholder="Ask IT question">

<button onclick="askAI()">Ask AI</button>

</div>


<!-- CALENDAR -->

<div id="calendarPage" class="page" style="display:none">

<h2>Calendar</h2>

<div id="calendar"></div>

</div>


<!-- NOTES -->

<div id="notes" class="page" style="display:none">

<h2>Notes</h2>

<textarea id="notesArea" rows="10"></textarea>

<button onclick="saveNotes()">Save</button>

</div>


<!-- PROFILE -->

<div id="profile" class="page" style="display:none">

<h2>Profile</h2>

<input id="profileUser">
<input id="profilePass">

<button onclick="saveProfile()">Save</button>

</div>

</div>

</div>


<script>

/* =========================
USER SYSTEM (FIXED LOGIN)
========================= */

let users = JSON.parse(localStorage.getItem("users")) || []

if(!users.find(u=>u.username==="admin")){

users.push({
username:"admin",
password:"admin123",
role:"admin"
})

}

if(!users.find(u=>u.username==="user1")){

users.push({
username:"user1",
password:"pass123",
role:"user"
})

}

localStorage.setItem("users",JSON.stringify(users))

let currentUser=null

/* LOGIN */

function login(){

let u=document.getElementById("username").value.trim()
let p=document.getElementById("password").value.trim()

let user=users.find(x=>x.username===u && x.password===p)

if(!user){

alert("Invalid login")
return

}

currentUser=user

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

init()

}

/* LOGOUT */

function logout(){

location.reload()

}

/* NAVIGATION */

function showPage(p){

document.querySelectorAll(".page").forEach(x=>x.style.display="none")

document.getElementById(p).style.display="block"

}

/* DATABASE */

let tickets=JSON.parse(localStorage.getItem("tickets"))||[]

/* INIT */

function init(){

renderTickets()
updateStats()
loadNotes()
initCalendar()

}

/* CREATE TICKET */

function createTicket(){

let ticket={

id:Date.now(),
title:tTitle.value,
desc:tDesc.value,
priority:tPriority.value,
status:"Open",
owner:currentUser.username

}

tickets.push(ticket)

localStorage.setItem("tickets",JSON.stringify(tickets))

renderTickets()

alert("Ticket created")

}

/* RENDER TICKETS */

function renderTickets(){

let search=document.getElementById("searchTicket").value.toLowerCase()

ticketTable.innerHTML=""

tickets
.filter(t=>t.title.toLowerCase().includes(search))
.forEach(t=>{

ticketTable.innerHTML+=`

<tr>
<td>${t.title}</td>
<td>${t.status}</td>
<td>${t.priority}</td>
<td>

<button onclick="closeTicket(${t.id})">Close</button>
<button onclick="deleteTicket(${t.id})">Delete</button>

</td>
</tr>

`

})

updateStats()

}

/* CLOSE */

function closeTicket(id){

let t=tickets.find(x=>x.id===id)

t.status="Closed"

localStorage.setItem("tickets",JSON.stringify(tickets))

renderTickets()

}

/* DELETE */

function deleteTicket(id){

tickets=tickets.filter(x=>x.id!==id)

localStorage.setItem("tickets",JSON.stringify(tickets))

renderTickets()

}

/* STATS */

function updateStats(){

statTotal.innerText=tickets.length
statOpen.innerText=tickets.filter(t=>t.status==="Open").length
statClosed.innerText=tickets.filter(t=>t.status==="Closed").length

}

/* CSV EXPORT */

function exportCSV(){

let csv="Title,Status,Priority\n"

tickets.forEach(t=>{
csv+=`${t.title},${t.status},${t.priority}\n`
})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="tickets.csv"

a.click()

}

/* VOICE */

function voiceInput(){

let rec=new webkitSpeechRecognition()

rec.onresult=e=>{
tDesc.value+=e.results[0][0].transcript
}

rec.start()

}

/* AI */

const GROQ_API_KEY="PASTE_GROQ_API_KEY"

async function askAI(){

let q=chatInput.value

chat.innerHTML+=`<div>User: ${q}</div>`

if(GROQ_API_KEY==="PASTE_GROQ_API_KEY"){

chat.innerHTML+=`<div>AI: Add Groq API key</div>`
return

}

let res=await fetch("https://api.groq.com/openai/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_API_KEY
},

body:JSON.stringify({
model:"llama3-8b-8192",
messages:[{role:"user",content:q}]
})

})

let data=await res.json()

let reply=data.choices[0].message.content

chat.innerHTML+=`<div>AI: ${reply}</div>`

}

/* NOTES */

function saveNotes(){

localStorage.setItem("notes",notesArea.value)

}

function loadNotes(){

notesArea.value=localStorage.getItem("notes")||""

}

/* PROFILE */

function saveProfile(){

currentUser.username=profileUser.value
currentUser.password=profilePass.value

localStorage.setItem("users",JSON.stringify(users))

alert("Saved")

}

/* CALENDAR */

function initCalendar(){

let calendarEl=document.getElementById("calendar")

let events=JSON.parse(localStorage.getItem("events")||"[]")

let calendar=new FullCalendar.Calendar(calendarEl,{

initialView:"dayGridMonth",

events:events,

dateClick:function(info){

let title=prompt("Event title")

if(!title)return

let event={title:title,start:info.dateStr}

events.push(event)

localStorage.setItem("events",JSON.stringify(events))

calendar.addEvent(event)

}

})

calendar.render()

}

</script>

</body>
</html>
