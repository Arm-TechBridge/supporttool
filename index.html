<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IT Helpdesk Ticket System</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      color:#e2e8f0;
      min-height:100vh;
      overflow-x:hidden;
    }

    /* Modern Tech Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.3) 0%, transparent 50%);
      z-index: -2;
    }
    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      position: relative;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(45deg, transparent 49%, rgba(255,255,255,0.02) 50%, transparent 51%, transparent 99%),
        linear-gradient(-45deg, transparent 49%, rgba(255,255,255,0.02) 50%, transparent 51%, transparent 99%);
      background-size: 20px 20px;
      z-index: -1;
      opacity: 0.5;
    }

    .hidden { display:none !important; }

    /* Login */
    #loginPage {
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .login-card {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      padding:40px 32px;
      border-radius:16px;
      box-shadow:0 8px 32px rgba(0,0,0,0.3);
      width:100%;
      max-width:420px;
      text-align:center;
    }
    .login-card h1 { color:#fff; margin-bottom:8px; }
    .login-card input, .login-card button {
      width:100%;
      padding:14px;
      margin:12px 0;
      border-radius:8px;
      font-size:1rem;
      background: rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.2);
      color:#fff;
    }
    .login-card input::placeholder { color:#ccc; }
    .login-card button {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color:#fff;
      border:none;
      cursor:pointer;
      font-weight:500;
      transition: transform 0.2s;
    }
    .login-card button:hover { transform: translateY(-1px); }
    .error { color:#ff6b6b; margin-top:12px; }

    /* Sidebar */
    #sidebar {
      width:240px;
      background: rgba(15,15,35,0.95);
      backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255,255,255,0.1);
      color:#e2e8f0;
      padding:24px 16px;
      position:fixed;
      height:100%;
    }
    #sidebar h2 { margin-bottom:32px; text-align:center; color:#fff; }
    #sidebar ul { list-style:none; }
    #sidebar a {
      color:#e2e8f0;
      text-decoration:none;
      display:block;
      padding:12px 16px;
      border-radius:8px;
      margin:4px 0;
      transition:0.2s;
    }
    #sidebar a:hover, #sidebar a.active { 
      background: rgba(79,70,229,0.2); 
      color:#fff;
    }

    /* Main content */
    #mainContent {
      margin-left:240px;
      padding:32px;
      background: rgba(26,26,46,0.8);
      min-height:100vh;
    }
    .stats-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:20px;
      margin:32px 0;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      padding:24px;
      border-radius:12px;
      text-align:center;
    }
    .card h3 { color:#94a3b8; margin-bottom:8px; }
    .card span { font-size:2.4rem; font-weight:700; color:#4f46e5; }

    .create-ticket-section, .manage-users-section {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      padding:28px;
      border-radius:12px;
      margin-top:32px;
    }
    form { display:flex; flex-direction:column; gap:16px; }
    input, textarea, select, button {
      padding:14px;
      border-radius:8px;
      font-size:1rem;
      background: rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.2);
      color:#fff;
    }
    input::placeholder, textarea::placeholder { color:#ccc; }
    button {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color:#fff;
      border:none;
      cursor:pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: translateY(-1px); }
    button.danger { background: linear-gradient(135deg, #ef4444, #dc2626); }

    .ticket-item {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      padding:20px;
      margin:16px 0;
      border-radius:12px;
      display:flex;
      justify-content:space-between;
      gap:20px;
      flex-wrap:wrap;
    }
    .ticket-item h3 { color:#fff; margin-bottom:8px; }
    .ticket-item p { color:#cbd5e1; line-height:1.5; }
    .meta {
      margin-top:12px;
      font-size:0.9rem;
      color:#94a3b8;
    }
    .actions { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
    .actions select { 
      padding:8px 12px; 
      border-radius:6px; 
      background: rgba(255,255,255,0.1);
      border:1px solid rgba(255,255,255,0.2);
      color:#fff;
    }

    @media (max-width: 840px) {
      #sidebar { width:100%; height:auto; position:static; }
      #mainContent { margin-left:0; padding:20px; }
      .ticket-item { flex-direction:column; }
    }
  </style>
</head>
<body>

  <!-- Login Page -->
  <div id="loginPage">
    <div class="login-card">
      <h1>IT Helpdesk</h1>
      <p style="color:#94a3b8; margin:12px 0 24px;">
        Login with your username and password<br><br>
        Admin: <strong>admin / admin</strong><br>
        User: <strong>user1 / pass</strong>
      </p>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required autocomplete="username">
        <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
        <button type="submit">Login</button>
      </form>
      <p id="loginError" class="error"></p>
    </div>
  </div>

  <!-- App Layout (hidden until login) -->
  <div id="appLayout" class="hidden">
    <div id="sidebar"></div>
    <div id="mainContent">

      <!-- Dashboard (User or Admin) -->
      <div id="dashboardPage" class="page">
        <h1 id="dashboardTitle">Dashboard</h1>
        <div class="stats-grid">
          <div class="card"><h3>Total Tickets</h3><span id="statTotal">0</span></div>
          <div class="card"><h3>Open</h3><span id="statOpen">0</span></div>
          <div class="card"><h3>In Progress</h3><span id="statInProgress">0</span></div>
          <div class="card"><h3>Closed</h3><span id="statClosed">0</span></div>
        </div>

        <!-- User: Create Ticket -->
        <div id="createTicketSection" class="create-ticket-section hidden">
          <h2>Create New Ticket</h2>
          <form id="createTicketForm">
            <input type="text" id="ticketTitle" placeholder="Ticket Title" required>
            <textarea id="ticketDesc" placeholder="Describe the issue in detail..." required rows="5"></textarea>
            <select id="ticketPriority">
              <option value="Low">Priority: Low</option>
              <option value="Medium">Priority: Medium</option>
              <option value="High">Priority: High</option>
            </select>
            <button type="submit">Submit Ticket</button>
          </form>
        </div>

        <!-- Admin: Manage Users -->
        <div id="manageUsersSection" class="manage-users-section hidden">
          <h2>Manage Users</h2>
          <form id="addUserForm" style="display:flex; gap:12px; flex-wrap:wrap; margin:20px 0;">
            <input type="text" id="newUsername" placeholder="Username" required style="flex:1; min-width:160px;">
            <input type="password" id="newPassword" placeholder="Password" required style="flex:1; min-width:160px;">
            <button type="submit">Add User</button>
          </form>
          <div id="usersList"></div>
        </div>
      </div>

      <!-- Tickets Page -->
      <div id="ticketsPage" class="page hidden">
        <h1 id="ticketsTitle">Tickets</h1>
        <input type="text" id="searchInput" placeholder="Search by title or description..." style="width:100%; max-width:500px; padding:12px; margin:16px 0; border:1px solid rgba(255,255,255,0.2); border-radius:8px; background:rgba(255,255,255,0.1); color:#fff;">
        <div id="ticketsList"></div>
      </div>

    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // Data & Auth
    // ────────────────────────────────────────────────

    const defaultUsers = [
      { id:1, username:'admin',  password:'admin',  role:'admin' },
      { id:2, username:'user1',  password:'pass',   role:'user'  }
    ];

    function initStorage() {
      if (!localStorage.getItem('users')) {
        localStorage.setItem('users', JSON.stringify(defaultUsers));
      }
      if (!localStorage.getItem('tickets')) {
        localStorage.setItem('tickets', JSON.stringify([]));
      }
    }

    function getUsers()          { return JSON.parse(localStorage.getItem('users')   || '[]'); }
    function saveUsers(u)        { localStorage.setItem('users',   JSON.stringify(u)); }
    function getTickets()        { return JSON.parse(localStorage.getItem('tickets') || '[]'); }
    function saveTickets(t)      { localStorage.setItem('tickets', JSON.stringify(t)); }

    let currentUser = null;

    function login(username, password) {
      const user = getUsers().find(u => u.username === username && u.password === password);
      if (user) {
        currentUser = user;
        localStorage.setItem('currentUser', JSON.stringify(user));
        return true;
      }
      return false;
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('currentUser');
      showPage('login');
    }

    function isAdmin() { return currentUser?.role === 'admin'; }

    // ────────────────────────────────────────────────
    // UI Navigation
    // ────────────────────────────────────────────────

    function showPage(page) {
      // Hide all
      document.querySelectorAll('.page, .create-ticket-section, .manage-users-section').forEach(el => el.classList.add('hidden'));
      document.getElementById('loginPage').classList.add('hidden');
      document.getElementById('appLayout').classList.add('hidden');

      if (page === 'login') {
        document.getElementById('loginPage').classList.remove('hidden');
      } else {
        document.getElementById('appLayout').classList.remove('hidden');
        document.getElementById('dashboardPage').classList.remove('hidden');

        // Dynamic Sidebar
        document.getElementById('sidebar').innerHTML = `
          <h2>IT Helpdesk</h2>
          <ul>
            <li><a href="#" class="${page==='dashboard'?'active':''}" onclick="showPage('dashboard'); return false;">Dashboard</a></li>
            <li><a href="#" class="${page==='tickets'?'active':''}" onclick="showPage('tickets'); return false;">${isAdmin() ? 'All Tickets' : 'My Tickets'}</a></li>
            ${isAdmin() ? '<li><a href="#" onclick="showManageUsers(); return false;">Manage Users</a></li>' : ''}
            <li><a href="#" onclick="logout(); return false;">Logout</a></li>
          </ul>
        `;

        if (page === 'tickets') {
          document.getElementById('dashboardPage').classList.add('hidden');
          document.getElementById('ticketsPage').classList.remove('hidden');
          renderTickets();
        } else if (page === 'dashboard') {
          updateDashboard();
          if (!isAdmin()) {
            document.getElementById('createTicketSection').classList.remove('hidden');
          }
        }
      }
    }

    function showManageUsers() {
      document.getElementById('createTicketSection').classList.add('hidden');
      document.getElementById('manageUsersSection').classList.remove('hidden');
      loadUsersList();
    }

    // ────────────────────────────────────────────────
    // Dashboard Stats
    // ────────────────────────────────────────────────

    function updateDashboard() {
      const tickets = getTickets().filter(t => !isAdmin() ? t.createdBy === currentUser.id : true);
      const total   = tickets.length;
      const open    = tickets.filter(t=>t.status==='Open').length;
      const inProg  = tickets.filter(t=>t.status==='In Progress').length;
      const closed  = tickets.filter(t=>t.status==='Closed').length;

      document.getElementById('statTotal').textContent      = total;
      document.getElementById('statOpen').textContent       = open;
      document.getElementById('statInProgress').textContent = inProg;
      document.getElementById('statClosed').textContent     = closed;
      document.getElementById('dashboardTitle').textContent = isAdmin() ? 'Admin Dashboard' : 'My Dashboard';
    }

    // ────────────────────────────────────────────────
    // Tickets Rendering
    // ────────────────────────────────────────────────

    function renderTickets() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      let tickets = getTickets();

      if (!isAdmin()) {
        tickets = tickets.filter(t => t.createdBy === currentUser.id);
      }

      if (query) {
        tickets = tickets.filter(t =>
          t.title.toLowerCase().includes(query) ||
          t.desc.toLowerCase().includes(query)
        );
      }

      document.getElementById('ticketsTitle').textContent = isAdmin() ? 'All Tickets' : 'My Tickets';

      document.getElementById('ticketsList').innerHTML = tickets.length === 0
        ? '<p style="padding:20px; color:#94a3b8; text-align:center;">No tickets found.</p>'
        : tickets.map(t => `
          <div class="ticket-item">
            <div style="flex:1;">
              <h3>${t.title}</h3>
              <p style="margin:8px 0; color:#cbd5e1;">${t.desc}</p>
              <div class="meta">
                Status: <strong>${t.status}</strong> • 
                Priority: <strong>${t.priority}</strong> • 
                Created: ${new Date(t.createdAt).toLocaleString()}
              </div>
            </div>
            ${isAdmin() ? `
            <div class="actions">
              <select onchange="updateTicket(${t.id}, 'status', this.value)">
                <option ${t.status==='Open'?'selected':''}>Open</option>
                <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
                <option ${t.status==='Closed'?'selected':''}>Closed</option>
              </select>
              <select onchange="updateTicket(${t.id}, 'priority', this.value)">
                <option ${t.priority==='Low'?'selected':''}>Low</option>
                <option ${t.priority==='Medium'?'selected':''}>Medium</option>
                <option ${t.priority==='High'?'selected':''}>High</option>
              </select>
              <button class="danger" onclick="deleteTicket(${t.id})">Delete</button>
            </div>` : ''}
          </div>
        `).join('');
    }

    function updateTicket(id, field, value) {
      let tickets = getTickets();
      const ticket = tickets.find(t => t.id === id);
      if (ticket) {
        ticket[field] = value;
        saveTickets(tickets);
        renderTickets();
        updateDashboard();
      }
    }

    function deleteTicket(id) {
      if (!confirm('Delete this ticket permanently?')) return;
      saveTickets(getTickets().filter(t => t.id !== id));
      renderTickets();
      updateDashboard();
    }

    // ────────────────────────────────────────────────
    // Event Listeners
    // ────────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      initStorage();

      // Try auto-login from storage
      const stored = localStorage.getItem('currentUser');
      if (stored) {
        currentUser = JSON.parse(stored);
        if (getUsers().some(u => u.id === currentUser.id)) {
          showPage('dashboard');
          return;
        }
      }

      showPage('login');

      // Login form
      document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const pw = document.getElementById('password').value;
        if (login(username, pw)) {
          showPage('dashboard');
        } else {
          document.getElementById('loginError').textContent = 'Invalid username or password';
        }
      });

      // Create ticket
      document.getElementById('createTicketForm')?.addEventListener('submit', e => {
        e.preventDefault();
        const title = document.getElementById('ticketTitle').value.trim();
        const desc = document.getElementById('ticketDesc').value.trim();
        const priority = document.getElementById('ticketPriority').value;
        if (!title || !desc) return alert('Title and description required');

        const tickets = getTickets();
        tickets.push({
          id: Date.now(),
          title, desc,
          status: 'Open',
          priority,
          createdBy: currentUser.id,
          createdAt: new Date().toISOString()
        });
        saveTickets(tickets);
        e.target.reset();
        alert('Ticket created successfully');
        updateDashboard();
      });

      // Add user (admin only)
      document.getElementById('addUserForm')?.addEventListener('submit', e => {
        e.preventDefault();
        const username = document.getElementById('newUsername').value.trim();
        const pw = document.getElementById('newPassword').value;
        if (!username || !pw) return alert('Username and password required');

        const users = getUsers();
        if (users.some(u => u.username === username)) return alert('Username already exists');

        const id = Math.max(...users.map(u=>u.id), 0) + 1;
        users.push({ id, username, password:pw, role:'user' });
        saveUsers(users);
        alert('User added successfully');
        loadUsersList();
        e.target.reset();
      });

      // Search on tickets page
      document.getElementById('searchInput')?.addEventListener('input', renderTickets);
    });

    function loadUsersList() {
      const users = getUsers().filter(u => u.role === 'user');
      document.getElementById('usersList').innerHTML = users.length === 0
        ? '<p style="color:#94a3b8;">No users yet.</p>'
        : users.map(u => `
          <div style="background:rgba(255,255,255,0.05); padding:12px; margin:10px 0; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.1);">
            <span>${u.username}</span>
            <button class="danger" onclick="deleteUser(${u.id})">Delete</button>
          </div>
        `).join('');
    }

    function deleteUser(id) {
      if (!confirm('Delete this user?')) return;
      saveUsers(getUsers().filter(u => u.id !== id));
      loadUsersList();
    }
  </script>
</body>
</html>
