<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FutureOS Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0a0a0f;
color:white;
display:flex;
flex-direction:column;
align-items:center;
}

header{
width:100%;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
background:#111;
letter-spacing:2px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
width:95%;
}

.card{
background:#151520;
border-radius:15px;
padding:20px;
box-shadow:0 0 15px #00ffff22;
}

h2{
margin-bottom:10px;
color:#00ffff;
}

button{
background:#00ffff;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

input,textarea{
width:100%;
padding:8px;
margin-top:5px;
background:#222;
color:white;
border:none;
border-radius:5px;
}

#chatbox{
height:200px;
overflow:auto;
background:#111;
padding:10px;
margin-bottom:10px;
border-radius:8px;
}

.message{
margin-bottom:8px;
}

.calendar-day{
display:inline-block;
width:40px;
height:40px;
line-height:40px;
text-align:center;
margin:3px;
border-radius:6px;
background:#222;
cursor:pointer;
}

.calendar-day:hover{
background:#00ffff;
color:black;
}

.clock{
font-size:35px;
text-align:center;
}

</style>
</head>

<body>

<header>🚀 FUTURE AI DASHBOARD</header>

<div class="dashboard">

<!-- CLOCK -->

<div class="card">
<h2>⏰ Clock</h2>
<div class="clock" id="clock"></div>
</div>

<!-- AI CHAT -->

<div class="card">
<h2>🤖 AI Assistant</h2>

<div id="chatbox"></div>

<input id="userInput" placeholder="Ask something...">
<button onclick="sendMessage()">Send</button>

</div>

<!-- TODO -->

<div class="card">
<h2>✅ Task Manager</h2>

<input id="taskInput" placeholder="New task">
<button onclick="addTask()">Add Task</button>

<ul id="taskList"></ul>

</div>

<!-- NOTES -->

<div class="card">
<h2>📝 Notes</h2>

<textarea id="notes" rows="8" placeholder="Write notes..."></textarea>
<button onclick="saveNotes()">Save</button>

</div>

<!-- CALENDAR -->

<div class="card">
<h2>📅 Calendar</h2>
<div id="calendar"></div>
</div>

</div>

<script>

/////////////////////////
//// CLOCK
/////////////////////////

function updateClock(){
let now = new Date();
document.getElementById("clock").innerHTML =
now.toLocaleTimeString();
}

setInterval(updateClock,1000);

/////////////////////////
//// AI CHAT
/////////////////////////

function sendMessage(){

let input = document.getElementById("userInput");
let chat = document.getElementById("chatbox");

let userText = input.value;

if(!userText) return;

chat.innerHTML += "<div class='message'>👤 "+userText+"</div>";

let reply = aiReply(userText);

chat.innerHTML += "<div class='message'>🤖 "+reply+"</div>";

chat.scrollTop = chat.scrollHeight;

input.value="";
}

function aiReply(text){

text = text.toLowerCase();

if(text.includes("hello")) return "Hello! How can I assist you today?";
if(text.includes("time")) return new Date().toLocaleTimeString();
if(text.includes("date")) return new Date().toDateString();
if(text.includes("help")) return "You can manage tasks, notes and calendar.";

return "I'm still learning. Ask something else!";
}

/////////////////////////
//// TASK MANAGER
/////////////////////////

function addTask(){

let input = document.getElementById("taskInput");
let list = document.getElementById("taskList");

let li = document.createElement("li");

li.textContent = input.value;

li.onclick = function(){
li.remove();
};

list.appendChild(li);

input.value="";

}

/////////////////////////
//// NOTES
/////////////////////////

function saveNotes(){

let notes = document.getElementById("notes").value;

localStorage.setItem("futureNotes",notes);

alert("Notes Saved");

}

document.getElementById("notes").value =
localStorage.getItem("futureNotes") || "";

/////////////////////////
//// CALENDAR
/////////////////////////

function generateCalendar(){

let calendar = document.getElementById("calendar");

let days = 31;

for(let i=1;i<=days;i++){

let day = document.createElement("div");

day.className="calendar-day";

day.innerText=i;

calendar.appendChild(day);

}

}

generateCalendar();

</script>

</body>
</html>
