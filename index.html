<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WorldTech ServiceDesk - AI ITSM</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Roboto',sans-serif;
      color:#e2e8f0;
      background:linear-gradient(135deg,#0a0a1a 0%,#1a1a2e 50%,#16213e 100%);
      min-height:100vh;
    }
    body::before{
      content:'';position:fixed;inset:0;
      background:radial-gradient(circle at 10% 90%,rgba(99,102,241,0.25)0%,transparent 50%),
                 radial-gradient(circle at 90% 10%,rgba(139,92,246,0.25)0%,transparent 50%);
      z-index:-2;
    }
    .hidden{display:none!important}

    /* Login */
    #loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .login-card{
      background:rgba(20,20,40,0.95);backdrop-filter:blur(16px);
      border:1px solid rgba(99,102,241,0.4);padding:60px 40px;
      border-radius:24px;box-shadow:0 12px 48px rgba(0,0,0,0.7);
      width:100%;max-width:480px;text-align:center;
    }
    .login-card h1{color:white;margin-bottom:24px;font-size:2.2rem}
    .login-card input,.login-card button{
      width:100%;padding:16px 20px;margin:14px 0;border-radius:12px;
      font-size:1.1rem;background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.18);color:white;
    }
    .login-card button{background:linear-gradient(90deg,#6366f1,#8b5cf6);border:none;cursor:pointer}
    .error{color:#ff6b6b;margin-top:14px}

    /* Layout */
    #appLayout{display:flex;min-height:100vh}
    #sidebar{
      width:280px;background:rgba(10,10,25,0.98);backdrop-filter:blur(16px);
      border-right:1px solid rgba(99,102,241,0.2);padding:40px 24px;
      position:fixed;height:100%;overflow-y:auto;
    }
    #sidebar h2{color:white;margin-bottom:40px;text-align:center;font-size:1.4rem}
    #sidebar a{
      display:flex;align-items:center;gap:12px;padding:16px 20px;margin:8px 0;
      color:#cbd5e1;text-decoration:none;border-radius:12px;transition:all .2s;
    }
    #sidebar a:hover,#sidebar a.active{background:rgba(99,102,241,0.3);color:white}

    #mainContent{margin-left:280px;padding:48px;width:100%}

    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:24px;margin:36px 0}
    .card{
      background:rgba(255,255,255,0.07);backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.15);padding:32px;border-radius:16px;text-align:center;
    }
    .card h3{color:#94a3b8;margin-bottom:12px}
    .card span{font-size:3rem;font-weight:700;color:#6366f1}

    .section-card{
      background:rgba(255,255,255,0.06);backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.15);padding:36px;border-radius:16px;margin:36px 0;
    }

    form{display:flex;flex-direction:column;gap:20px}
    input,textarea,select,button{
      padding:16px 20px;border-radius:12px;font-size:1.1rem;
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);color:white;
    }
    button{background:linear-gradient(90deg,#6366f1,#8b5cf6);border:none;cursor:pointer}
    button:hover{transform:translateY(-1px)}
    button.ai-btn{background:linear-gradient(90deg,#10b981,#059669)}
    button.danger{background:linear-gradient(90deg,#ef4444,#dc2626)}

    .ticket-item{
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);
      padding:28px;margin:24px 0;border-radius:16px;display:flex;justify-content:space-between;gap:28px;flex-wrap:wrap;
    }
    .ai-response{margin-top:18px;padding:18px;background:rgba(99,102,241,0.14);border-radius:12px;border-left:5px solid #6366f1;white-space:pre-wrap}

    #calendar{background:rgba(0,0,0,0.3);border-radius:12px;margin-top:20px}
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginPage">
    <div class="login-card">
      <h1>WorldTech ServiceDesk</h1>
      <p style="color:#94a3b8;margin:24px 0 36px;line-height:1.6">
        Enterprise AI ITSM Platform<br><br>
        <strong>admin / admin</strong> → Admin<br>
        <strong>user1 / pass</strong> → User
      </p>
      <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
      <p id="loginError" class="error"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="appLayout" class="hidden">
    <div id="sidebar"></div>
    <div id="mainContent">

      <div id="dashboardPage">
        <h1 id="dashboardTitle">Dashboard</h1>
        <div class="stats-grid">
          <div class="card"><h3>Total</h3><span id="statTotal">—</span></div>
          <div class="card"><h3>Open</h3><span id="statOpen">—</span></div>
          <div class="card"><h3>In Progress</h3><span id="statInProgress">—</span></div>
          <div class="card"><h3>Closed</h3><span id="statClosed">—</span></div>
        </div>

        <!-- Create Ticket -->
        <div id="createTicketArea" class="section-card hidden">
          <h2>New Ticket</h2>
          <form id="createTicketForm">
            <input type="text" id="ticketTitle" placeholder="Title" required>
            <textarea id="ticketDesc" placeholder="Describe the issue..." rows="5" required></textarea>
            <button type="button" class="ai-btn" onclick="aiSuggest()">AI Suggest Priority</button>
            <select id="ticketPriority"><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High</option></select>
            <button type="submit">Create Ticket</button>
          </form>
        </div>

        <!-- Manage Users -->
        <div id="manageUsersArea" class="section-card hidden">
          <h2>Manage Users</h2>
          <form id="addUserForm" style="display:flex;gap:16px;margin-bottom:24px">
            <input type="text" id="newUsername" placeholder="Username" required>
            <input type="password" id="newPassword" placeholder="Password" required>
            <button type="submit">Add User</button>
          </form>
          <div id="usersList"></div>
        </div>

        <!-- Self-Service AI Portal -->
        <div class="section-card">
          <h2>Self-Service AI Portal</h2>
          <input type="text" id="aiQuery" placeholder="Type any IT issue (e.g. WiFi not working)..." style="width:100%;margin-bottom:16px">
          <button class="ai-btn" onclick="aiChat()">Ask AI (Step-by-Step)</button>
          <div id="aiChatResponse" class="ai-response hidden"></div>
        </div>

        <!-- Calendar -->
        <div class="section-card">
          <h2>Service Calendar</h2>
          <div id="calendar"></div>
        </div>
      </div>

      <!-- Tickets Page -->
      <div id="ticketsPage" class="section-card hidden">
        <h1 id="ticketsTitle">Tickets</h1>
        <input type="text" id="searchInput" placeholder="Search tickets..." style="width:100%;margin-bottom:24px">
        <div id="ticketsList"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <script>
    const GROQ_KEY = 'gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'; // ← REPLACE WITH YOUR REAL GROQ KEY

    // Default data
    const defaultUsers = [{id:1,username:'admin',password:'admin',role:'admin'},{id:2,username:'user1',password:'pass',role:'user'}];
    const defaultKB = [{title:"Slow PC",text:"1. Close apps\n2. Update drivers\n3. Scan malware"},{title:"No WiFi",text:"1. Restart router\n2. Renew IP\n3. Check cables"}];

    function initStorage(){
      if(!localStorage.users) localStorage.users = JSON.stringify(defaultUsers);
      if(!localStorage.tickets) localStorage.tickets = JSON.stringify([]);
      if(!localStorage.kb) localStorage.kb = JSON.stringify(defaultKB);
    }

    const getUsers = () => JSON.parse(localStorage.users || '[]');
    const saveUsers = u => localStorage.users = JSON.stringify(u);
    const getTickets = () => JSON.parse(localStorage.tickets || '[]');
    const saveTickets = t => localStorage.tickets = JSON.stringify(t);

    let currentUser = null;

    function login(un, pw){
      const user = getUsers().find(u => u.username === un && u.password === pw);
      if(user){
        currentUser = user;
        localStorage.currentUser = JSON.stringify(user);
        return true;
      }
      return false;
    }

    function logout(){
      currentUser = null;
      localStorage.removeItem('currentUser');
      showView('login');
    }

    function isAdmin(){ return currentUser?.role === 'admin'; }

    function showView(view){
      document.querySelectorAll('#loginPage,#dashboardPage,#ticketsPage,#createTicketArea,#manageUsersArea').forEach(el=>el.classList.add('hidden'));

      if(view==='login'){
        document.getElementById('loginPage').classList.remove('hidden');
        return;
      }

      document.getElementById('appLayout').classList.remove('hidden');
      document.getElementById('dashboardPage').classList.remove('hidden');

      document.getElementById('sidebar').innerHTML = `
        <h2>WorldTech ServiceDesk</h2>
        <a ${view==='dashboard'?'class="active"':''} onclick="showView('dashboard');return false"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a ${view==='tickets'?'class="active"':''} onclick="showView('tickets');return false"><i class="fas fa-ticket-alt"></i> Tickets</a>
        ${isAdmin()?'<a onclick="showManageUsers();return false"><i class="fas fa-users"></i> Manage Users</a>':''}
        <a onclick="logout();return false"><i class="fas fa-sign-out-alt"></i> Logout</a>
      `;

      if(view==='tickets'){
        document.getElementById('dashboardPage').classList.add('hidden');
        document.getElementById('ticketsPage').classList.remove('hidden');
        renderTickets();
      } else {
        updateDashboard();
        if(!isAdmin()) document.getElementById('createTicketArea').classList.remove('hidden');
      }
    }

    function showManageUsers(){
      document.getElementById('createTicketArea').classList.add('hidden');
      document.getElementById('manageUsersArea').classList.remove('hidden');
      renderUserList();
    }

    function updateDashboard(){
      const tickets = getTickets().filter(t => isAdmin() || t.createdBy === currentUser.id);
      document.getElementById('statTotal').textContent = tickets.length;
      document.getElementById('statOpen').textContent = tickets.filter(t=>t.status==='Open').length;
      document.getElementById('statInProgress').textContent = tickets.filter(t=>t.status==='In Progress').length;
      document.getElementById('statClosed').textContent = tickets.filter(t=>t.status==='Closed').length;
    }

    function renderTickets(){
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      let list = getTickets().filter(t => isAdmin() || t.createdBy === currentUser.id);
      if(q) list = list.filter(t => t.title.toLowerCase().includes(q) || t.description.toLowerCase().includes(q));

      document.getElementById('ticketsList').innerHTML = list.map(t => `
        <div class="ticket-item">
          <div style="flex:1">
            <h3>${t.title}</h3>
            <p>${t.description}</p>
            <div class="meta"><strong>${t.status}</strong> • ${t.priority} • ${new Date(t.createdAt).toLocaleString()}</div>
          </div>
          ${isAdmin() ? `<div class="actions">
            <button class="ai-btn" onclick="aiFix(${t.id})">AI Step-by-Step Fix</button>
            <button class="danger" onclick="deleteTicket(${t.id})">Delete</button>
          </div>` : ''}
        </div>
      `).join('') || '<p style="color:#94a3b8;text-align:center">No tickets yet</p>';
    }

    function renderUserList(){
      const users = getUsers().filter(u => u.role === 'user');
      document.getElementById('usersList').innerHTML = users.map(u => `
        <div style="background:rgba(255,255,255,0.06);padding:16px;margin:12px 0;border-radius:12px;display:flex;justify-content:space-between">
          <span>${u.username}</span>
          <button class="danger" onclick="deleteUser(${u.id})">Delete</button>
        </div>
      `).join('') || '<p style="color:#94a3b8">No users</p>';
    }

    // ─── REAL AI (Groq) ─────────────────────────────────────
    async function callAI(prompt){
      if(!GROQ_KEY || GROQ_KEY.includes('xxxx')) return "Please add your Groq API key in the code.";

      const res = await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_KEY}`},
        body:JSON.stringify({
          model:'llama3-8b-8192',
          messages:[{role:'system',content:'You are WorldTech AI. Give clear numbered step-by-step fixes.'},{role:'user',content:prompt}],
          max_tokens:600
        })
      });
      const data = await res.json();
      return data.choices[0].message.content;
    }

    async function aiSuggest(){
      const desc = document.getElementById('ticketDesc').value.trim();
      if(!desc) return alert("Write description first");
      const response = await callAI(`Suggest priority (Low/Medium/High) and reason for: ${desc}`);
      alert(response);
    }

    async function aiFix(id){
      const ticket = getTickets().find(t => t.id === id);
      if(!ticket) return;
      const response = await callAI(`Give step-by-step fix for: ${ticket.title} - ${ticket.description}`);
      alert("AI Step-by-Step Fix:\n\n" + response);
    }

    async function aiChat(){
      const query = document.getElementById('aiQuery').value.trim();
      if(!query) return alert("Type your issue");
      const container = document.getElementById('aiChatResponse');
      container.classList.remove('hidden');
      container.textContent = "AI thinking...";
      const response = await callAI(`User issue: ${query}. Reply with clear numbered step-by-step troubleshooting guide.`);
      container.textContent = response;
    }

    // ─── CRUD ───────────────────────────────────────────────
    document.getElementById('createTicketForm')?.addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('ticketTitle').value.trim();
      const desc = document.getElementById('ticketDesc').value.trim();
      const prio = document.getElementById('ticketPriority').value;

      if(!title || !desc) return alert("Fill all fields");

      const tickets = getTickets();
      tickets.push({
        id: Date.now(),
        title, description: desc,
        status: 'Open',
        priority: prio,
        createdBy: currentUser.id,
        createdAt: new Date().toISOString()
      });
      saveTickets(tickets);
      e.target.reset();
      alert("Ticket created successfully!");
      updateDashboard();
    });

    document.getElementById('addUserForm')?.addEventListener('submit', e => {
      e.preventDefault();
      const un = document.getElementById('newUsername').value.trim();
      const pw = document.getElementById('newPassword').value;

      if(!un || !pw) return alert("Fill both fields");

      const users = getUsers();
      if(users.some(u=>u.username===un)) return alert("Username exists");

      const id = Math.max(0,...users.map(u=>u.id))+1;
      users.push({id,username:un,password:pw,role:'user'});
      saveUsers(users);
      alert("User added");
      renderUserList();
      e.target.reset();
    });

    function deleteTicket(id){
      if(confirm("Delete ticket?")){
        saveTickets(getTickets().filter(t=>t.id!==id));
        renderTickets();
        updateDashboard();
      }
    }

    function deleteUser(id){
      if(confirm("Delete user?")){
        saveUsers(getUsers().filter(u=>u.id!==id));
        renderUserList();
      }
    }

    // ─── INIT ───────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      init();

      const stored = localStorage.currentUser;
      if(stored){
        currentUser = JSON.parse(stored);
        if(getUsers().some(u=>u.id===currentUser.id)){
          showView('dashboard');
          return;
        }
      }

      showView('login');

      document.getElementById('loginForm').addEventListener('submit', e=>{
        e.preventDefault();
        const un = document.getElementById('username').value.trim();
        const pw = document.getElementById('password').value;
        if(login(un,pw)){
          showView('dashboard');
        } else {
          document.getElementById('loginError').textContent = 'Wrong credentials';
        }
      });
    });
  </script>
</body>
</html>
