<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WorldTech ServiceDesk</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--accent:#3b82f6;
--text:#e5e7eb;
--border:#334155;
}

*{box-sizing:border-box;font-family:'Inter',sans-serif}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
background:rgba(30,41,59,.8);
backdrop-filter:blur(8px);
border-bottom:1px solid var(--border);
}

.logo{
font-weight:600;
font-size:18px;
}

.clock{
font-size:14px;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:240px;
background:var(--card);
border-right:1px solid var(--border);
padding-top:20px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:var(--text);
text-decoration:none;
font-size:14px;
}

.sidebar a:hover{
background:rgba(255,255,255,.05);
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.card{
background:var(--card);
border-radius:10px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 20px rgba(0,0,0,.2);
}

.stats{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.stat{
background:var(--card);
padding:20px;
border-radius:10px;
text-align:center;
}

button{
background:var(--accent);
border:none;
padding:10px 14px;
border-radius:6px;
color:white;
cursor:pointer;
}

input,textarea,select{
width:100%;
padding:8px;
margin:5px 0 10px;
border-radius:6px;
border:1px solid var(--border);
background:#020617;
color:white;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th,.table td{
border-bottom:1px solid var(--border);
padding:10px;
text-align:left;
}

.login{
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:var(--card);
padding:40px;
border-radius:10px;
width:300px;
}

.mail{
border-bottom:1px solid var(--border);
padding:10px;
cursor:pointer;
}

.chatbox{
height:300px;
overflow:auto;
background:#020617;
padding:10px;
border-radius:6px;
margin-bottom:10px;
}

.note{
background:#020617;
padding:10px;
margin-bottom:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="loginPage" class="login">

<div class="login-box">
<h3>WorldTech ServiceDesk</h3>

<input id="emailInput" placeholder="Enter Master Email">

<button onclick="sendOTP()">Send OTP</button>

<div id="otpArea" style="display:none">
<input id="otpInput" placeholder="Enter OTP">
<button onclick="verifyOTP()">Login</button>
</div>

</div>

</div>

<div id="app" style="display:none">

<header>
<div class="logo">WorldTech ServiceDesk</div>
<div>
<span id="clock"></span>
<i class="fa fa-bell"></i>
</div>
</header>

<div class="container">

<div class="sidebar">
<a onclick="showPage('dashboard')">Dashboard</a>
<a onclick="showPage('tickets')">Tickets</a>
<a onclick="showPage('create')">Create Ticket</a>
<a onclick="showPage('mail')">Inbox</a>
<a onclick="showPage('ai')">AI Support</a>
<a onclick="showPage('calendar')">Calendar</a>
<a onclick="showPage('notes')">Notes</a>
<a onclick="exportCSV()">Export CSV</a>
</div>

<div class="main">

<div id="dashboardPage">

<div class="stats">
<div class="stat"><h2 id="totalCount">0</h2>Total</div>
<div class="stat"><h2 id="openCount">0</h2>Open</div>
<div class="stat"><h2 id="progressCount">0</h2>Progress</div>
<div class="stat"><h2 id="closedCount">0</h2>Closed</div>
</div>

</div>

<div id="ticketsPage" style="display:none">

<div class="card">
<input id="searchTicket" placeholder="Search ticket" onkeyup="renderTickets()">

<table class="table">
<thead>
<tr>
<th>Title</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="ticketTable"></tbody>
</table>

</div>

</div>

<div id="createPage" style="display:none">

<div class="card">

<input id="title" placeholder="Title">

<textarea id="desc" placeholder="Description"></textarea>

<button onclick="voiceInput()"><i class="fa fa-microphone"></i></button>

<select id="priority">
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<select id="category">
<option>Network</option>
<option>Software</option>
<option>Hardware</option>
</select>

<button onclick="aiSuggest()">AI Suggest Priority</button>

<button onclick="createTicket()">Create Ticket</button>

</div>

</div>

<div id="mailPage" style="display:none">

<div class="card">
<h3>Inbox</h3>
<div id="mailList"></div>
</div>

</div>

<div id="aiPage" style="display:none">

<div class="card">

<div class="chatbox" id="chat"></div>

<input id="aiInput" placeholder="Ask IT issue">

<button onclick="askAI()">Send</button>

</div>

</div>

<div id="calendarPage" style="display:none">
<div id="calendar"></div>
</div>

<div id="notesPage" style="display:none">

<div class="card">

<textarea id="noteText"></textarea>

<button onclick="saveNote()">Save Note</button>

<div id="noteList"></div>

</div>

</div>

</div>
</div>

</div>

<script>

/* MASTER ADMIN EMAIL */
const masterEmail="armtechbridge@gmail.com";

/* GROQ API PLACEHOLDER */
const GROQ_API_KEY="PASTE_GROQ_API_KEY_HERE";

/* OTP LOGIN */

let generatedOTP="";

function sendOTP(){

const email=document.getElementById("emailInput").value;

if(email!==masterEmail){alert("Invalid email");return}

generatedOTP=Math.floor(100000+Math.random()*900000).toString();

let mails=JSON.parse(localStorage.getItem("mails")||"[]");

mails.unshift({subject:"OTP Login",body:"Your OTP is "+generatedOTP});

localStorage.setItem("mails",JSON.stringify(mails));

alert("OTP sent to Inbox & SMS");

document.getElementById("otpArea").style.display="block";

}

function verifyOTP(){

if(document.getElementById("otpInput").value===generatedOTP){

document.getElementById("loginPage").style.display="none";

document.getElementById("app").style.display="block";

init();

}else alert("Wrong OTP")

}

/* INIT */

function init(){

renderTickets();

renderMail();

loadNotes();

initCalendar();

updateStats();

}

/* CLOCK */

setInterval(()=>{

let d=new Date();

let h=d.getHours();

let m=d.getMinutes();

let ampm=h>=12?"PM":"AM";

h=h%12||12;

document.getElementById("clock").innerText=
h+":"+m.toString().padStart(2,"0")+" "+ampm;

},1000)

/* PAGE NAV */

function showPage(p){

["dashboard","tickets","create","mail","ai","calendar","notes"].forEach(x=>{
document.getElementById(x+"Page").style.display="none";
});

document.getElementById(p+"Page").style.display="block";

}

/* TICKETS */

function createTicket(){

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

tickets.push({
title:title.value,
desc:desc.value,
priority:priority.value,
status:"Open"
});

localStorage.setItem("tickets",JSON.stringify(tickets));

renderTickets();
updateStats();

alert("Ticket created");

}

function renderTickets(){

let tickets=JSON.parse(localStorage.getItem("tickets")||"[]");

let html="";

tickets.forEach((t,i)=>{

html+=`
<tr>
<td>${t.title}</td>
<td>${t.priority}</td>
<td>${t.status}</td>
<td>
<button onclick="closeTicket(${i})">Close</button>
<button onclick="deleteTicket(${i})">Delete</button>
</td>
</tr>`

})

ticketTable.innerHTML=html;

}

function closeTicket(i){

let t=JSON.parse(localStorage.getItem("tickets"));

t[i].status="Closed";

localStorage.setItem("tickets",JSON.stringify(t));

renderTickets();
updateStats();

}

function deleteTicket(i){

if(confirm("Delete ticket?")){

let t=JSON.parse(localStorage.getItem("tickets"));

t.splice(i,1);

localStorage.setItem("tickets",JSON.stringify(t));

renderTickets();
updateStats();

}

}

/* STATS */

function updateStats(){

let t=JSON.parse(localStorage.getItem("tickets")||"[]");

totalCount.innerText=t.length;
openCount.innerText=t.filter(x=>x.status=="Open").length;
closedCount.innerText=t.filter(x=>x.status=="Closed").length;
progressCount.innerText=t.filter(x=>x.status=="In Progress").length;

}

/* MAIL */

function renderMail(){

let mails=JSON.parse(localStorage.getItem("mails")||"[]");

mailList.innerHTML=mails.map(m=>`
<div class="mail">
<b>${m.subject}</b><br>${m.body}
</div>
`).join("");

}

/* AI */

async function askAI(){

let q=aiInput.value;

chat.innerHTML+=`<div>You: ${q}</div>`;

let res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+GROQ_API_KEY
},
body:JSON.stringify({
model:"llama3-8b-8192",
messages:[{role:"user",content:q}]
})
});

let data=await res.json();

let ans=data.choices[0].message.content;

chat.innerHTML+=`<div>AI: ${ans}</div>`;

}

/* AI PRIORITY */

function aiSuggest(){

alert("AI Suggestion feature will use Groq to analyze description.");

}

/* VOICE */

function voiceInput(){

let r=new webkitSpeechRecognition();

r.onresult=e=>{
desc.value+=e.results[0][0].transcript;
};

r.start();

}

/* CALENDAR */

function initCalendar(){

let calendarEl=document.getElementById('calendar');

let calendar=new FullCalendar.Calendar(calendarEl,{
initialView:'dayGridMonth',
editable:true,
events:JSON.parse(localStorage.getItem("events")||"[]"),
dateClick:function(info){

let title=prompt("Event title");

if(title){

calendar.addEvent({title:title,start:info.dateStr});

let e=calendar.getEvents().map(ev=>({title:ev.title,start:ev.start}));

localStorage.setItem("events",JSON.stringify(e));

}

}
});

calendar.render();

}

/* NOTES */

function saveNote(){

let notes=JSON.parse(localStorage.getItem("notes")||"[]");

notes.push(noteText.value);

localStorage.setItem("notes",JSON.stringify(notes));

loadNotes();

}

function loadNotes(){

let notes=JSON.parse(localStorage.getItem("notes")||"[]");

noteList.innerHTML=notes.map(n=>`<div class="note">${n}</div>`).join("");

}

/* CSV EXPORT */

function exportCSV(){

let t=JSON.parse(localStorage.getItem("tickets")||"[]");

let csv="Title,Priority,Status\n";

t.forEach(x=>csv+=`${x.title},${x.priority},${x.status}\n`);

let blob=new Blob([csv]);

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="tickets.csv";

a.click();

}

</script>

</body>
</html>
