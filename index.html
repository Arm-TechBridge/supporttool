<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WorldTech ServiceDesk - AI Powered ITSM</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Roboto', sans-serif;
      color: #e2e8f0;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 10% 90%, rgba(99,102,241,0.25) 0%, transparent 50%),
                  radial-gradient(circle at 90% 10%, rgba(139,92,246,0.25) 0%, transparent 50%),
                  radial-gradient(circle at 50% 30%, rgba(34,197,94,0.15) 0%, transparent 60%);
      z-index: -2;
    }

    .hidden { display: none !important; }

    /* ─── LOGIN ─── */
    #loginPage {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(20, 20, 40, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(99,102,241,0.4);
      padding: 60px 40px;
      border-radius: 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.7);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .login-card h1 { 
      color: white; 
      margin-bottom: 24px; 
      font-weight: 500; 
      font-size: 2.2rem;
    }

    .login-card input, .login-card button {
      width: 100%;
      padding: 16px 20px;
      margin: 14px 0;
      border-radius: 12px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
    }

    .login-card button {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .login-card button:hover { transform: translateY(-2px); }

    .error { color: #ff6b6b; margin-top: 14px; font-size: 1rem; }

    /* ─── LAYOUT ─── */
    #appLayout { display: flex; min-height: 100vh; }

    #sidebar {
      width: 280px;
      background: rgba(10,10,25,0.98);
      backdrop-filter: blur(16px);
      border-right: 1px solid rgba(99,102,241,0.2);
      color: #e2e8f0;
      padding: 40px 24px;
      position: fixed;
      height: 100%;
      overflow-y: auto;
    }

    #sidebar h2 {
      color: white;
      margin-bottom: 40px;
      text-align: center;
      font-weight: 500;
      font-size: 1.4rem;
    }

    #sidebar a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      margin: 8px 0;
      color: #cbd5e1;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.2s;
    }

    #sidebar a:hover,
    #sidebar a.active {
      background: rgba(99,102,241,0.3);
      color: white;
    }

    #mainContent {
      margin-left: 280px;
      padding: 48px;
      width: 100%;
    }

    h1 { color: white; margin-bottom: 28px; font-weight: 500; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin: 36px 0;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 32px;
      border-radius: 16px;
      text-align: center;
    }

    .card h3 { color: #94a3b8; margin-bottom: 12px; font-weight: 400; }
    .card span { font-size: 3rem; font-weight: 700; color: #6366f1; }

    .section-card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 36px;
      border-radius: 16px;
      margin: 36px 0;
    }

    form { display: flex; flex-direction: column; gap: 20px; }

    input, textarea, select, button {
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 1.1rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: white;
    }

    button {
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border: none;
      cursor: pointer;
      font-weight: 500;
      transition: transform 0.2s;
    }

    button:hover { transform: translateY(-1px); }

    button.ai-btn {
      background: linear-gradient(90deg, #10b981, #059669);
      font-size: 1rem;
      padding: 12px 24px;
      align-self: flex-start;
    }

    button.danger {
      background: linear-gradient(90deg, #ef4444, #dc2626);
    }

    .ticket-item {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 28px;
      margin: 24px 0;
      border-radius: 16px;
      display: flex;
      justify-content: space-between;
      gap: 28px;
      flex-wrap: wrap;
    }

    .ticket-item h3 { color: white; margin-bottom: 14px; }
    .ticket-item p { color: #cbd5e1; line-height: 1.6; }

    .meta { margin-top: 16px; font-size: 0.95rem; color: #94a3b8; }

    .actions { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }

    .ai-response {
      margin-top: 18px;
      padding: 18px;
      background: rgba(99,102,241,0.14);
      border-radius: 12px;
      border-left: 5px solid #6366f1;
      white-space: pre-wrap;
      color: #fff;
    }

    .kanban-board {
      display: flex;
      gap: 24px;
      overflow-x: auto;
      padding: 20px 0;
    }

    .kanban-column {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 20px;
      min-width: 300px;
      flex: 1;
    }

    .kanban-column h3 { color: white; margin-bottom: 16px; }

    .kanban-card {
      background: rgba(255,255,255,0.06);
      padding: 16px;
      margin-bottom: 12px;
      border-radius: 8px;
      border-left: 4px solid #6366f1;
    }

    @media (max-width: 900px) {
      #sidebar { width: 100%; height: auto; position: static; padding: 28px 20px; }
      #mainContent { margin-left: 0; padding: 28px; }
      .ticket-item { flex-direction: column; }
      .kanban-board { flex-direction: column; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div id="loginPage">
    <div class="login-card">
      <h1>WorldTech ServiceDesk</h1>
      <p style="color:#94a3b8; margin:24px 0 36px; line-height:1.6;">
        Advanced ITSM like Jira & ServiceNow<br><br>
        <strong>admin / admin</strong> → Admin<br>
        <strong>user1 / pass</strong> → User
      </p>

      <form id="loginForm">
        <input type="text"     id="username" placeholder="Username" required autocomplete="off">
        <input type="password" id="password" placeholder="Password" required autocomplete="off">
        <button type="submit">Login</button>
      </form>

      <p id="loginError" class="error"></p>
    </div>
  </div>

  <!-- APP -->
  <div id="appLayout" class="hidden">

    <div id="sidebar"></div>

    <div id="mainContent">

      <!-- DASHBOARD -->
      <div id="dashboardPage">
        <h1 id="dashboardTitle">Dashboard</h1>

        <div class="stats-grid">
          <div class="card"><h3>Total Tickets</h3><span id="statTotal">—</span></div>
          <div class="card"><h3>Open</h3><span id="statOpen">—</span></div>
          <div class="card"><h3>In Progress</h3><span id="statInProgress">—</span></div>
          <div class="card"><h3>Closed</h3><span id="statClosed">—</span></div>
        </div>

        <!-- Create Ticket -->
        <div id="createTicketArea" class="section-card hidden">
          <h2>New Ticket</h2>
          <form id="createTicketForm">
            <input type="text" id="ticketTitle" placeholder="Title" required>
            <textarea id="ticketDesc" placeholder="Describe issue..." rows="4" required></textarea>
            <button type="button" class="ai-btn" onclick="aiSuggestPriority()">AI Suggest</button>
            <select id="ticketPriority">
              <option value="Low">Low</option>
              <option value="Medium">Medium</option>
              <option value="High">High</option>
            </select>
            <select id="ticketCategory">
              <option value="Hardware">Hardware</option>
              <option value="Software">Software</option>
              <option value="Network">Network</option>
              <option value="Other">Other</option>
            </select>
            <button type="submit">Create</button>
          </form>
        </div>

        <!-- Manage Users -->
        <div id="manageUsersArea" class="section-card hidden">
          <h2>Users</h2>
          <form id="addUserForm" style="display:flex; gap:16px; margin-bottom:28px;">
            <input type="text" id="newUsername" placeholder="Username" required>
            <input type="password" id="newPassword" placeholder="Password" required>
            <button type="submit">Add</button>
          </form>
          <div id="usersList"></div>
        </div>

        <!-- Knowledge Base -->
        <div class="section-card">
          <h2>Self-Service Portal</h2>
          <input type="text" id="kbSearch" placeholder="Search knowledge..." style="margin-bottom:24px;">
          <div id="knowledgeList"></div>
        </div>

        <!-- Kanban Board -->
        <div class="section-card">
          <h2>Kanban Board</h2>
          <div class="kanban-board">
            <div class="kanban-column">
              <h3>To Do</h3>
              <div id="kanban-todo"></div>
            </div>
            <div class="kanban-column">
              <h3>In Progress</h3>
              <div id="kanban-progress"></div>
            </div>
            <div class="kanban-column">
              <h3>Done</h3>
              <div id="kanban-done"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Tickets List -->
      <div id="ticketsPage" class="section-card hidden">
        <h1 id="ticketsTitle">Tickets</h1>
        <input type="text" id="searchInput" placeholder="Search..." style="margin-bottom:24px;">
        <div id="ticketsList"></div>
      </div>
    </div>
  </div>

  <script>
    // ─── CONFIG ─────────────────────────────────────────────

    const GROQ_KEY = 'gsk_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'; // REPLACE WITH YOUR GROQ KEY

    // ─── DATA ───────────────────────────────────────────────

    const defaultUsers = [
      { id:1, username:'admin', password:'admin', role:'admin' },
      { id:2, username:'user1', password:'pass', role:'user' }
    ];

    const defaultKB = [
      { title:"Slow PC", text:"Close apps • Clean disk • Update drivers • Scan malware" },
      { title:"No Wi-Fi", text:"Restart router • Forget network • Renew IP • Check signal" },
      { title:"Printer Issue", text:"Check connection • Clear queue • Update driver • Troubleshoot" }
    ];

    // ─── STORAGE ────────────────────────────────────────────

    function init() {
      if (!localStorage.users) localStorage.users = JSON.stringify(defaultUsers);
      if (!localStorage.tickets) localStorage.tickets = JSON.stringify([]);
      if (!localStorage.kb) localStorage.kb = JSON.stringify(defaultKB);
    }

    const getUsers = () => JSON.parse(localStorage.users || '[]');
    const saveUsers = u => localStorage.users = JSON.stringify(u);
    const getTickets = () => JSON.parse(localStorage.tickets || '[]');
    const saveTickets = t => localStorage.tickets = JSON.stringify(t);
    const getKB = () => JSON.parse(localStorage.kb || '[]');
    const saveKB = k => localStorage.kb = JSON.stringify(k);

    let currentUser = null;

    // ─── AUTH ───────────────────────────────────────────────

    function login(un, pw) {
      const user = getUsers().find(u => u.username === un && u.password === pw);
      if (user) {
        currentUser = user;
        localStorage.currentUser = JSON.stringify(user);
        return true;
      }
      return false;
    }

    function logout() {
      currentUser = null;
      localStorage.removeItem('currentUser');
      showView('login');
    }

    function isAdmin() { return currentUser?.role === 'admin'; }

    // ─── VIEWS ──────────────────────────────────────────────

    function showView(view) {
      document.querySelectorAll('#loginPage, #dashboardPage, #ticketsPage, #createTicketArea, #manageUsersArea').forEach(el => el.classList.add('hidden'));

      if (view === 'login') {
        document.getElementById('loginPage').classList.remove('hidden');
        return;
      }

      document.getElementById('appLayout').classList.remove('hidden');

      document.getElementById('sidebar').innerHTML = `
        <h2>WorldTech ServiceDesk</h2>
        <a ${view==='dashboard'?'class="active"':''} onclick="showView('dashboard');return false">
          <i class="fas fa-tachometer-alt"></i> Dashboard
        </a>
        <a ${view==='tickets'?'class="active"':''} onclick="showView('tickets');return false">
          <i class="fas fa-ticket-alt"></i> ${isAdmin()?'All Tickets':'My Tickets'}
        </a>
        ${isAdmin() ? '<a onclick="showManageUsers();return false"><i class="fas fa-users"></i> Users</a>' : ''}
        <a onclick="showView('kanban');return false"><i class="fas fa-columns"></i> Kanban</a>
        <a onclick="logout();return false"><i class="fas fa-sign-out-alt"></i> Logout</a>
      `;

      if (view === 'tickets') {
        document.getElementById('ticketsPage').classList.remove('hidden');
        renderTickets();
      } else {
        document.getElementById('dashboardPage').classList.remove('hidden');
        updateDashboard();
        if (!isAdmin()) document.getElementById('createTicketArea').classList.remove('hidden');
      }
    }

    function showManageUsers() {
      document.getElementById('createTicketArea').classList.add('hidden');
      document.getElementById('manageUsersArea').classList.remove('hidden');
      renderUserList();
    }

    function showKanban() {
      showView('dashboard');
      renderKanban();
    }

    // ─── RENDER ─────────────────────────────────────────────

    function updateDashboard() {
      const tickets = getTickets().filter(t => isAdmin() || t.createdBy === currentUser.id);
      document.getElementById('statTotal').textContent = tickets.length;
      document.getElementById('statOpen').textContent = tickets.filter(t=>t.status==='Open').length;
      document.getElementById('statInProgress').textContent = tickets.filter(t=>t.status==='In Progress').length;
      document.getElementById('statClosed').textContent = tickets.filter(t=>t.status==='Closed').length;
      document.getElementById('dashboardTitle').textContent = isAdmin() ? 'Admin Dashboard' : 'My Dashboard';
    }

    function renderTickets() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      let list = getTickets().filter(t => isAdmin() || t.createdBy === currentUser.id);

      if (q) list = list.filter(t => 
        t.title.toLowerCase().includes(q) || t.description.toLowerCase().includes(q)
      );

      document.getElementById('ticketsTitle').textContent = isAdmin() ? 'All Tickets' : 'My Tickets';

      document.getElementById('ticketsList').innerHTML = list.map(t => `
        <div class="ticket-item">
          <div style="flex:1;">
            <h3>${t.title}</h3>
            <p>${t.description}</p>
            <div class="meta">
              <strong>${t.status}</strong> • ${t.priority} • ${t.category} • ${new Date(t.createdAt).toLocaleString()}
            </div>
            <div id="ai-${t.id}" class="ai-response hidden"></div>
          </div>
          ${isAdmin() ? `
            <div class="actions">
              <select onchange="updateTicket(${t.id}, 'status', this.value)">
                <option ${t.status==='Open'?'selected':''}>Open</option>
                <option ${t.status==='In Progress'?'selected':''}>In Progress</option>
                <option ${t.status==='Closed'?'selected':''}>Closed</option>
              </select>
              <select onchange="updateTicket(${t.id}, 'priority', this.value)">
                <option ${t.priority==='Low'?'selected':''}>Low</option>
                <option ${t.priority==='Medium'?'selected':''}>Medium</option>
                <option ${t.priority==='High'?'selected':''}>High</option>
              </select>
              <select onchange="updateTicket(${t.id}, 'category', this.value)">
                <option ${t.category==='Hardware'?'selected':''}>Hardware</option>
                <option ${t.category==='Software'?'selected':''}>Software</option>
                <option ${t.category==='Network'?'selected':''}>Network</option>
                <option ${t.category==='Other'?'selected':''}>Other</option>
              </select>
              <button class="ai-btn" onclick="aiFix(${t.id})">AI Fix</button>
              <button class="danger" onclick="deleteTicket(${t.id})">Delete</button>
            </div>` : ''}
        </div>
      `).join('') || '<p style="color:#94a3b8; padding:32px; text-align:center;">No tickets</p>';
    }

    function renderUserList() {
      const users = getUsers().filter(u => u.role === 'user');
      document.getElementById('usersList').innerHTML = users.map(u => `
        <div style="background:rgba(255,255,255,0.06); padding:16px; margin:12px 0; border-radius:12px; display:flex; justify-content:space-between;">
          <span>${u.username}</span>
          <button class="danger" onclick="deleteUser(${u.id})">Delete</button>
        </div>
      `).join('') || '<p style="color:#94a3b8;">No users</p>';
    }

    function renderKnowledgeBase() {
      const q = document.getElementById('kbSearch').value.toLowerCase().trim();
      const items = getKB().filter(i => 
        i.title.toLowerCase().includes(q) || i.text.toLowerCase().includes(q)
      );

      document.getElementById('knowledgeList').innerHTML = items.map(i => `
        <div class="section-card" style="margin:16px 0;">
          <h3>${i.title}</h3>
          <p style="white-space:pre-line; color:#cbd5e1;">${i.text}</p>
        </div>
      `).join('') || '<p style="color:#94a3b8; text-align:center;">No results</p>';
    }

    function renderKanban() {
      const tickets = getTickets().filter(t => isAdmin() || t.createdBy === currentUser.id);
      const todo = tickets.filter(t => t.status === 'Open');
      const progress = tickets.filter(t => t.status === 'In Progress');
      const done = tickets.filter(t => t.status === 'Closed');

      document.getElementById('kanban-todo').innerHTML = todo.map(t => `
        <div class="kanban-card">
          <strong>${t.title}</strong><br>
          <small>${t.priority} • ${new Date(t.createdAt).toLocaleDateString()}</small>
        </div>
      `).join('') || '<p style="color:#94a3b8;">No tasks</p>';

      document.getElementById('kanban-progress').innerHTML = progress.map(t => `
        <div class="kanban-card">
          <strong>${t.title}</strong><br>
          <small>${t.priority} • ${new Date(t.createdAt).toLocaleDateString()}</small>
        </div>
      `).join('') || '<p style="color:#94a3b8;">No tasks</p>';

      document.getElementById('kanban-done').innerHTML = done.map(t => `
        <div class="kanban-card">
          <strong>${t.title}</strong><br>
          <small>${t.priority} • ${new Date(t.createdAt).toLocaleDateString()}</small>
        </div>
      `).join('') || '<p style="color:#94a3b8;">No tasks</p>';
    }

    // ─── AI INTEGRATION ─────────────────────────────────────

    async function callAI(prompt, system = "You are an expert IT support AI. Be concise and helpful.") {
      if (!GROQ_KEY || GROQ_KEY.includes('xxxx')) {
        return "API key not set. Add your Groq key in code.";
      }

      try {
        const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${GROQ_KEY}` },
          body: JSON.stringify({
            model: 'llama3-8b-8192', // Fast & free
            messages: [{ role: 'system', content: system }, { role: 'user', content: prompt }],
            temperature: 0.7,
            max_tokens: 400
          })
        });

        if (!res.ok) throw new Error(`Error ${res.status}`);

        const data = await res.json();
        return data.choices[0].message.content.trim();
      } catch (e) {
        console.error(e);
        return "AI unavailable. Try again later.";
      }
    }

    async function aiSuggestPriority() {
      const desc = document.getElementById('ticketDesc').value.trim();
      if (!desc) return alert("Describe the issue first.");

      const response = await callAI(`Classify priority (Low/Medium/High) for this IT issue: ${desc}`);
      const prio = response.match(/Low|Medium|High/i)?.[0] || 'Medium';

      document.getElementById('ticketPriority').value = prio;
      alert(`AI: Priority ${prio}`);
    }

    async function aiFix(ticketId) {
      const ticket = getTickets().find(t => t.id === ticketId);
      if (!ticket) return;

      const container = document.getElementById(`ai-${ticketId}`);
      container.classList.remove('hidden');
      container.textContent = 'AI analyzing...';

      const response = await callAI(`Provide 3-5 step-by-step fixes for this IT ticket:\nTitle: ${ticket.title}\nDescription: ${ticket.description}`);
      container.textContent = response;
    }

    // ─── CRUD ───────────────────────────────────────────────

    document.getElementById('createTicketForm')?.addEventListener('submit', e => {
      e.preventDefault();
      const title = document.getElementById('ticketTitle').value.trim();
      const desc = document.getElementById('ticketDesc').value.trim();
      const prio = document.getElementById('ticketPriority').value;
      const cat = document.getElementById('ticketCategory').value;

      if (!title || !desc) return alert("Complete title & description.");

      const tickets = getTickets();
      tickets.push({
        id: Date.now(),
        title, description: desc,
        status: 'Open',
        priority: prio,
        category: cat,
        createdBy: currentUser.id,
        createdAt: new Date().toISOString()
      });
      saveTickets(tickets);
      e.target.reset();
      alert("Ticket created!");
      updateDashboard();
      renderKanban();
    });

    document.getElementById('addUserForm')?.addEventListener('submit', e => {
      e.preventDefault();
      const un = document.getElementById('newUsername').value.trim();
      const pw = document.getElementById('newPassword').value;

      if (!un || !pw) return alert("Fields required.");

      const users = getUsers();
      if (users.some(u => u.username === un)) return alert("Username taken.");

      const id = Math.max(0, ...users.map(u=>u.id)) + 1;
      users.push({ id, username: un, password: pw, role: 'user' });
      saveUsers(users);
      alert("User added.");
      renderUserList();
      e.target.reset();
    });

    function updateTicket(id, field, value) {
      let tickets = getTickets();
      const t = tickets.find(t => t.id === id);
      if (t) {
        t[field] = value;
        saveTickets(tickets);
        renderTickets();
        updateDashboard();
        renderKanban();
      }
    }

    function deleteTicket(id) {
      if (!confirm("Delete?")) return;
      saveTickets(getTickets().filter(t => t.id !== id));
      renderTickets();
      updateDashboard();
      renderKanban();
    }

    function deleteUser(id) {
      if (!confirm("Delete?")) return;
      saveUsers(getUsers().filter(u => u.id !== id));
      renderUserList();
    }

    // ─── INIT ───────────────────────────────────────────────

    document.addEventListener('DOMContentLoaded', () => {
      init();

      // Resume
      try {
        const stored = localStorage.currentUser;
        if (stored) {
          currentUser = JSON.parse(stored);
          if (getUsers().some(u => u.id === currentUser.id)) {
            showView('dashboard');
            return;
          }
        }
      } catch {}
      localStorage.removeItem('currentUser');

      showView('login');

      document.getElementById('loginForm').addEventListener('submit', e => {
        e.preventDefault();
        const un = document.getElementById('username').value.trim();
        const pw = document.getElementById('password').value;
        if (login(un, pw)) {
          showView('dashboard');
        } else {
          document.getElementById('loginError').textContent = 'Invalid credentials';
        }
      });

      document.getElementById('searchInput')?.addEventListener('input', renderTickets);
      document.getElementById('kbSearch')?.addEventListener('input', renderKnowledgeBase);
    });
  </script>
</body>
</html>
