<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Helpdesk - Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="sidebar">
        <h2>IT Helpdesk</h2>
        <nav>
            <ul>
                <li><a href="admin.html" class="active">Dashboard</a></li>
                <li><a href="tickets.html">Tickets</a></li>
                <li><a href="#" onclick="showManageUsers()">Manage Users</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </div>
    <div class="main-content">
        <div id="dashboardSection">
            <h1>Admin Dashboard</h1>
            <div class="stats-grid">
                <div class="card">
                    <h3>Total Tickets</h3>
                    <span id="totalTickets">0</span>
                </div>
                <div class="card">
                    <h3>Open</h3>
                    <span id="openTickets">0</span>
                </div>
                <div class="card">
                    <h3>In Progress</h3>
                    <span id="inProgressTickets">0</span>
                </div>
                <div class="card">
                    <h3>Closed</h3>
                    <span id="closedTickets">0</span>
                </div>
            </div>
        </div>
        <div id="manageUsersSection" style="display: none;">
            <h1>Manage Users</h1>
            <form id="addUserForm">
                <input type="text" id="newUsername" placeholder="New Username" required>
                <input type="password" id="newPassword" placeholder="New Password" required>
                <button type="submit">Add User</button>
            </form>
            <div id="usersList"></div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initStorage();
            if (!isLoggedIn() || getCurrentUser().role !== 'admin') {
                window.location.href = 'index.html';
                return;
            }
            loadDashboardStats();
            document.getElementById('addUserForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('newUsername').value;
                const password = document.getElementById('newPassword').value;
                addUser(username, password);
                loadUsersList();
                this.reset();
            });
            loadUsersList();
        });

        function showManageUsers() {
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('manageUsersSection').style.display = 'block';
            loadUsersList();
        }

        function loadUsersList() {
            const users = getUsers().filter(u => u.role === 'user'); // Exclude admin
            const list = document.getElementById('usersList');
            list.innerHTML = '<h3>Users</h3>' + users.map(u => `
                <div class="user-item">
                    <span>${u.username}</span>
                    <button onclick="deleteUser(${u.id})">Delete</button>
                </div>
            `).join('');
        }

        function loadDashboardStats() {
            const tickets = getTickets();
            document.getElementById('totalTickets').textContent = tickets.length;
            document.getElementById('openTickets').textContent = tickets.filter(t => t.status === 'Open').length;
            document.getElementById('inProgressTickets').textContent = tickets.filter(t => t.status === 'In Progress').length;
            document.getElementById('closedTickets').textContent = tickets.filter(t => t.status === 'Closed').length;
        }
    </script>
</body>
</html>
