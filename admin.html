<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard – IT Helpdesk</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sidebar">
    <h2>IT Helpdesk</h2>
    <nav>
      <ul>
        <li><a href="/admin.html" class="active">Dashboard</a></li>
        <li><a href="/tickets.html">All Tickets</a></li>
        <li><a href="#" onclick="showManageUsers(); return false;">Manage Users</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </nav>
  </div>

  <div class="main-content">

    <div id="dashboardSection">
      <h1>Admin Dashboard</h1>
      <div class="stats-grid">
        <div class="card"><h3>Total</h3><span id="totalTickets">0</span></div>
        <div class="card"><h3>Open</h3><span id="openTickets">0</span></div>
        <div class="card"><h3>In Progress</h3><span id="inProgressTickets">0</span></div>
        <div class="card"><h3>Closed</h3><span id="closedTickets">0</span></div>
      </div>
    </div>

    <div id="manageUsersSection" style="display:none;">
      <h1>Manage Users</h1>
      <form id="addUserForm" style="margin:24px 0;">
        <input type="text" id="newUsername" placeholder="Username" required>
        <input type="password" id="newPassword" placeholder="Password" required>
        <button type="submit">Add User</button>
      </form>
      <div id="usersList"></div>
    </div>

  </div>

  <script src="app.js"></script>
  <script>
    if (!isLoggedIn() || getCurrentUser().role !== 'admin') {
      window.location.href = '/index.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadDashboardStats();
      document.getElementById('addUserForm').addEventListener('submit', e => {
        e.preventDefault();
        const un = document.getElementById('newUsername').value.trim();
        const pw = document.getElementById('newPassword').value;
        if (un && pw) {
          addUser(un, pw);
          loadUsersList();
          e.target.reset();
        }
      });
      loadUsersList();
    });

    function showManageUsers() {
      document.getElementById('dashboardSection').style.display = 'none';
      document.getElementById('manageUsersSection').style.display = 'block';
      loadUsersList();
    }

    function loadDashboardStats() {
      const tickets = getTickets();
      document.getElementById('totalTickets').textContent     = tickets.length;
      document.getElementById('openTickets').textContent      = tickets.filter(t=>t.status==='Open').length;
      document.getElementById('inProgressTickets').textContent= tickets.filter(t=>t.status==='In Progress').length;
      document.getElementById('closedTickets').textContent    = tickets.filter(t=>t.status==='Closed').length;
    }

    function loadUsersList() {
      const users = getUsers().filter(u => u.role === 'user');
      document.getElementById('usersList').innerHTML = users.length === 0
        ? '<p>No regular users yet.</p>'
        : users.map(u => `
          <div class="user-item">
            <span>${u.username}</span>
            <button class="danger" onclick="deleteUser(${u.id})">Delete</button>
          </div>
        `).join('');
    }
  </script>
</body>
</html>
