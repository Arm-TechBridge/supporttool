<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User – IT Helpdesk</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="sidebar">
    <h2>IT Helpdesk</h2>
    <nav>
      <ul>
        <li><a href="/user.html" class="active">Dashboard</a></li>
        <li><a href="/tickets.html">My Tickets</a></li>
        <li><a href="#" onclick="logout(); return false;">Logout</a></li>
      </ul>
    </nav>
  </div>

  <div class="main-content">
    <h1>My Dashboard</h1>

    <div class="stats-grid">
      <div class="card"><h3>Total</h3><span id="totalMy">0</span></div>
      <div class="card"><h3>Open</h3><span id="openMy">0</span></div>
      <div class="card"><h3>In Progress</h3><span id="inProgressMy">0</span></div>
      <div class="card"><h3>Closed</h3><span id="closedMy">0</span></div>
    </div>

    <div class="create-ticket-section">
      <h2>Create New Ticket</h2>
      <form id="createTicketForm">
        <input type="text" id="ticketTitle" placeholder="Ticket Title" required>
        <textarea id="ticketDesc" placeholder="Describe the issue..." required rows="6"></textarea>
        <button type="submit">Submit Ticket</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if (!isLoggedIn() || getCurrentUser().role !== 'user') {
      window.location.href = '/index.html';
    }

    document.addEventListener('DOMContentLoaded', () => {
      loadMyStats();

      document.getElementById('createTicketForm').addEventListener('submit', e => {
        e.preventDefault();
        const title = document.getElementById('ticketTitle').value.trim();
        const desc  = document.getElementById('ticketDesc').value.trim();
        if (title && desc) {
          createTicket(title, desc, getCurrentUser().id);
          e.target.reset();
          loadMyStats();
          alert('Ticket created successfully');
        }
      });
    });

    function loadMyStats() {
      const uid = getCurrentUser().id;
      const my = getTickets().filter(t => t.createdBy === uid);
      document.getElementById('totalMy').textContent      = my.length;
      document.getElementById('openMy').textContent       = my.filter(t=>t.status==='Open').length;
      document.getElementById('inProgressMy').textContent = my.filter(t=>t.status==='In Progress').length;
      document.getElementById('closedMy').textContent     = my.filter(t=>t.status==='Closed').length;
    }
  </script>
</body>
</html>
