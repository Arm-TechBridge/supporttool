<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Helpdesk - User Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="sidebar">
        <h2>IT Helpdesk</h2>
        <nav>
            <ul>
                <li><a href="user.html" class="active">Dashboard</a></li>
                <li><a href="tickets.html">My Tickets</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </div>
    <div class="main-content">
        <h1>User Dashboard</h1>
        <div class="stats-grid">
            <div class="card">
                <h3>Total My Tickets</h3>
                <span id="totalMyTickets">0</span>
            </div>
            <div class="card">
                <h3>Open</h3>
                <span id="openMyTickets">0</span>
            </div>
            <div class="card">
                <h3>In Progress</h3>
                <span id="inProgressMyTickets">0</span>
            </div>
            <div class="card">
                <h3>Closed</h3>
                <span id="closedMyTickets">0</span>
            </div>
        </div>
        <div class="create-ticket-section">
            <h2>Create New Ticket</h2>
            <form id="createTicketForm">
                <input type="text" id="ticketTitle" placeholder="Ticket Title" required>
                <textarea id="ticketDesc" placeholder="Description" required></textarea>
                <button type="submit">Create Ticket</button>
            </form>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initStorage();
            if (!isLoggedIn() || getCurrentUser().role !== 'user') {
                window.location.href = 'index.html';
                return;
            }
            loadUserDashboardStats();
            const currentUser = getCurrentUser();
            document.getElementById('createTicketForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const title = document.getElementById('ticketTitle').value;
                const desc = document.getElementById('ticketDesc').value;
                if (!title || !desc) {
                    alert('Title and description are required!');
                    return;
                }
                createTicket(title, desc, currentUser.id);
                this.reset();
                loadUserDashboardStats();
                alert('Ticket created successfully!');
            });
        });

        function loadUserDashboardStats() {
            const currentUser = getCurrentUser();
            const tickets = getTickets().filter(t => t.createdBy === currentUser.id);
            document.getElementById('totalMyTickets').textContent = tickets.length;
            document.getElementById('openMyTickets').textContent = tickets.filter(t => t.status === 'Open').length;
            document.getElementById('inProgressMyTickets').textContent = tickets.filter(t => t.status === 'In Progress').length;
            document.getElementById('closedMyTickets').textContent = tickets.filter(t => t.status === 'Closed').length;
        }
    </script>
</body>
</html>
